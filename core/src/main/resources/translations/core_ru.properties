core.role.warlock.name=Чернокнижник
core.role.assassin.description=Убийца — быстрый и проворный класс. С относительно низким здоровьем и сильными контрами, это непростой класс в прямом столкновении. Лучше всего подходит для атаки отвлечённых или занятых врагов; будет испытывать трудности против подготовленных противников.
core.role.knight.description=Рыцарь — сильный, агрессивный класс. Он процветает в атаке, имея варианты увеличения урона, а также несколько способностей, которые удерживают его в живых достаточно долго, чтобы убить противника.
core.role.brute.description=Громила — силач, которого редко что может сдвинуть. Обладает хорошим контролем толпы и защитными способностями.
core.role.ranger.description=Рейнджер — дальнобойный класс, умелый в использовании лука. Есть разные варианты, вознаграждающие точность, терпение или дальнобойную меткость.
core.role.mage.description=Маг — класс, искусный в различных стихиях. Выбирайте между жизнью, льдом, огнём и землёй для поддержки союзников, захвата врагов и их уничтожения.
core.role.warlock.description=Чернокнижник — класс, сосредоточенный на здоровье. Одни способности требуют жертвы здоровьем, другие наказывают врагов за близость и низкое здоровье.

## Effects
core.effect.bleed.generic={0} наносит {1} урона в секунду
core.effect.poison.generic={0} наносит {1} урона за уровень каждые {2} секунды
