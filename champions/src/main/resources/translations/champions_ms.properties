# Ability display (interaction lore)
champions.ability.replace-armor.name=Ganti Perisai
champions.ability.replace-armor.description=Tambah atau buang peralatan yang disimpan pada item ini.
champions.ability.batto-do.name=Batto-Do
champions.ability.batto-do.description=Terjah ke hadapan dan serang sasaran di laluan anda, memberikan kerosakan, menolak mereka ke belakang, dan membakar mereka.
champions.ability.black-hole.name=Lubang Hitam
champions.ability.black-hole.description=Mencipta lubang hitam yang menarik entiti berdekatan untuk tempoh yang singkat.
champions.ability.cleanse.name=Bersih
champions.ability.cleanse.description=Membersihkan kesan negatif dan memberikan imuniti untuk tempoh yang singkat.
champions.ability.dodge.name=Elak
champions.ability.dodge.description=Bergerak pantas secara mendatar untuk mengelak serangan masuk.
champions.ability.effect-roulette.name=Roulette Kesan
champions.ability.effect-roulette.description=Memberikan kesan rawak untuk tempoh yang singkat. Kesan tersebut boleh jadi positif atau negatif.
champions.ability.energy-boost.name=Dorongan Tenaga
champions.ability.energy-boost.description=Memberikan dorongan tenaga tetap serta-merta apabila digunakan.
champions.ability.feather-feet.name=Kaki Bulu
champions.ability.feather-feet.description=Mencegah semua kerosakan jatuh semasa memegang item ini.
champions.ability.gator-stroke.name=Gator Stroke
champions.ability.gator-stroke.description=Mendorong pengguna pada kelajuan tinggi. Kebolehan ini hanya berfungsi dalam air.
champions.ability.hard-slash.name=Tebasan Kuat
champions.ability.hard-slash.description=Berikan kerosakan kepada musuh berdekatan dan tolak mereka ke belakang dengan tebasan berapi.
champions.ability.heavensplitter.name=Pembelah Langit
champions.ability.heavensplitter.description=Lempar senjata, panggil kuasa Thor, dan berikan kerosakan kepada musuh di laluannya.
champions.ability.hyper-rush.name=Hyper Rush
champions.ability.hyper-rush.description=Dapatkan pecutan kelajuan tinggi untuk tempoh yang singkat.
champions.ability.lifesteal.name=Curi Nyawa
champions.ability.lifesteal.description=Pulih sebahagian daripada kerosakan yang diberikan kepada musuh melalui serangan jarak dekat.
champions.ability.magnetism.name=Magnetisme
champions.ability.magnetism.description=Hasilkan kon zarah di hadapan anda yang menarik entiti ke dalam.
champions.ability.regeneration.name=Penjanaan Semula
champions.ability.regeneration.description=Dapatkan kesan penjanaan semula kecil untuk tempoh yang singkat.
champions.ability.shield.name=Perisai
champions.ability.shield.description=Dapatkan kesan penjanaan semula yang diperkuat semasa menggunakan kebolehan ini.
champions.ability.magnetic-pull.name=Tarikan Magnet
champions.ability.magnetic-pull.description=Musuh yang dipukul oleh senjata ini akan ditarik ke dalam dan bukannya ditolak.
champions.ability.skyforged-ascent.name=Pendakian Tempa Langit
champions.ability.skyforged-ascent.description=Lemparkan senjata untuk naik ke langit, menunggang kuasa ilahi, memberikan lonjakan kelajuan.
champions.ability.speed-boost.name=Peningkatan Kelajuan
champions.ability.speed-boost.description=Dapatkan efek kelajuan kecil untuk tempoh singkat.
champions.ability.throwing-web.name=Lempar Jaring
champions.ability.throwing-web.description=Lemparkan jaring yang meletakkan sarang labah-labah sementara semasa terkena. Boleh digunakan untuk memerangkap musuh.
champions.ability.tilling-tremor.name=Gegaran Tanah
champions.ability.tilling-tremor.description=Tuai tanaman dalam radius kecil. Musuh di kawasan itu akan menerima kerosakan dan ditolak ke belakang.
champions.ability.underwater-breathing.name=Pernafasan Bawah Air
champions.ability.underwater-breathing.description=Memberikan pernafasan bawah air serta-merta apabila memegang item ini di dalam air.
champions.ability.vine-snare.name=Perangkap Akar
champions.ability.vine-snare.description=Anak panah melepaskan akar yang membelenggu musuh dan mengikatnya ke tanah.
champions.ability.voltic-bash.name=Hentaman Petir
champions.ability.voltic-bash.description=Cas dan terjang ke hadapan, memberikan kerosakan kepada entiti di laluan anda. Cas lebih tinggi meningkatkan kerosakan dan kelajuan.
champions.ability.water-damage.name=Kerosakan Air
champions.ability.water-damage.description=Meningkatkan kerosakan serangan jarak dekat ketika di dalam air sebanyak jumlah tetap.
champions.ability.wind-dash.name=Lompat Angin
champions.ability.wind-dash.description=Terjun ke hadapan. Musuh pertama yang anda kena akan dilancarkan ke udara.
champions.ability.wind-slash.name=Tebasan Angin
champions.ability.wind-slash.description=Tembak 3 letupan angin. Apabila mengenai musuh, pulihkan sedikit tenaga dan berikan kerosakan kepada mereka.
champions.ability.nectar-of-decay.name=Nektar Reput
champions.ability.nectar-of-decay.description=Lepaskan bunga beracun yang meletup menjadi awan racun yang merebak, menyerap nyawa musuh untuk memulihkan nyawa anda.
champions.ability.soul-harvest.name=Tuaian Roh
champions.ability.soul-harvest.description=Kumpul roh pemain dan mob yang gugur untuk menuai roh mereka, mendapat peningkatan kerosakan dan kelajuan.
champions.ability.hunters-brand.name=Cap Pemburu
champions.ability.hunters-brand.description=Kena 2 tetapan semula Needlegrasp berturut-turut pada sasaran yang sama untuk mencetuskan keadaan frenzi. Juga memberikan kerosakan bonus kepada musuh yang diracuni.
champions.ability.needlegrasp.name=Cengkaman Jarum
champions.ability.needlegrasp.description=Lemparkan akar yang menarik anda dan musuh ke arah satu sama lain. Kena mereka dengan serangan jarak dekat untuk tetapkan semula masa rehat anda.
champions.ability.vipersprint.name=Pecut Viper
champions.ability.vipersprint.description=Terjang ke hadapan dengan laju tinggi, melengkungkan laluan mengikut bidikan sambil memotong apa sahaja di hadapan. Mengenai musuh menetapkan semula masa rehat anda.
champions.ability.healing-nova.name=Nova Penyembuhan
champions.ability.healing-nova.description=Melancarkan nova yang menyembuhkan rakan berdekatan sebanyak {0} {1} apabila mendarat.
champions.ability.meridian-beam.name=Sinar Meridian
champions.ability.meridian-beam.description=Menembak sinar tenaga berbahaya yang bergerak dalam garis lurus.
champions.ability.equip.name=Pakai
champions.ability.equip.description=Tukar serta-merta ke kelas {0}. Tidak berfungsi semasa dalam pertempuran. Perisai yang tersimpan pada item ini akan dipakai.

