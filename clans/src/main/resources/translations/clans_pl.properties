clans.tutorial.territory-claim={0} może rościć sobie prawo do terytorium, wykonując
clans.tutorial.territory-info=, które możesz używać do przechowywania przedmiotów. {0} {1} może używać armat do oblężenia cię, po osiągnięciu {2} {3} na tobie.
clans.tutorial.related-commands=Powiązane polecenia:
clans.tutorial.core-set=Na swoim terytorium możesz ustawić lokalizację, wykonując
