clans.tutorial.map-info= om de kaart te zien en je weg te vinden. Kaarten tonen je clangenoten. Tijdens een plundering tonen ze ook vijanden.
clans.tutorial.shops=In elke kardinale richting is er een {0} met {1}. Hier kun je de meeste items verkopen, essentiële goederen kopen, toegang krijgen tot kerkers en je klasse wijzigen.\nJe kunt hier teleporteren vanaf de wereldspawn.
clans.tutorial.fields=In het midden van de kaart is {0}. Een druk bezochte plek waar je ertsen kunt vinden, plekken om te vissen en een teleporter naar evenementen.
clans.tutorial.events=Periodiek vinden er evenementen plaats die je kunt bereiken via de portal in {0}. Deze evenementen kunnen {1} laten vallen. Dit zijn krachtige, speciale wapens met unieke eigenschappen. Je kunt hier ook runen en kerker-tokens vinden.
clans.tutorial.classes=Er zijn momenteel {0} {1} {2}, één voor elke wapenrusting. Elk heeft zijn sterke en zwakke punten. Er zijn veel verschillende {3} om uit te kiezen, kies degene die het beste bij jouw speelstijl passen. Je kunt {4} aanpassen voor elke {5} bij een enchantingtafel.
clans.tutorial.custom-items=Er zijn aangepaste items die je kunt vinden, kopen of craften. Je kunt de craftbare items en hun recepten bekijken door te rennen
clans.tutorial.custom-items-info=. Deze items kunnen worden gebruikt om je een voordeel te geven in gevecht, of om je te helpen bij het verzamelen van grondstoffen.
clans.tutorial.custom-items-rare=Sommige van deze items zijn alleen beschikbaar via evenementen, kerkers of raids, dus houd je ogen open.
clans.tutorial.reinforced=Klassen/Kits worden geïdentificeerd door wapenrusting, je hebt automatisch een klasse. Je kunt de specifieke wapenrustingset craften om de versterkte set te krijgen. Je mag alleen de versterkte set van je klasse dragen. Versterkte stukken geven verhoogde gezondheid.
clans.tutorial.upgraded-weapons=Je basiswapens kunnen worden verbeterd. {0} (gemaakt met goudblokken) of {1} (gemaakt met diamantblokken). {2} verhoogt de relevante {3} met {4} en {5} verhoogt schade met {6}. {7} wapens (gevonden bij evenementen) combineren de effecten van beide!
clans.tutorial.progression=Er is meer dan alleen gevecht, je kunt ook andere gebieden uitbreiden. Verbeter je progressie in {0}, {1} en {2}
clans.tutorial.fishing-title=Vissen
clans.tutorial.fishing=Pak je hengel en gooi hem in {0}, vis naar vissen en schatten. Stijg in niveau met vangsten, werp aas om vissen te lokken en verbeter je hengel om zwaardere vissen te vangen. Verkoop je vangst bij winkels of neem je schat mee naar huis.
clans.tutorial.mining-title=Mijnbouw
clans.tutorial.mining=Pak je houweel en ga naar de mijnen, want er wachten rijkdommen op je. Verdien ervaringspunten, met 5x meer in {0}. Hogere niveaus leiden tot meer drops en snellere mijnbouwsnelheden.
clans.tutorial.woodcutting-title=Houthakken
clans.tutorial.woodcutting=Pak je bijl en zoek een boom om te hakken. Stijg in niveau met elk blok hout dat je hakt, waardoor je toegang krijgt tot nieuwe voordelen en vaardigheden.
clans.tutorial.good-luck=Veel succes bij je avonturen en vergeet niet plezier te hebben.

