champions.ability.hard-slash.description=Infligez des dégâts aux ennemis proches et repoussez-les avec une taillade enflammée.
champions.ability.heavensplitter.name=Fendeur des cieux
champions.ability.heavensplitter.description=Lancez l''arme, invoquez la puissance de Thor et infligez des dégâts aux ennemis sur sa trajectoire.
champions.ability.hyper-rush.name=Hyper Rush
champions.ability.hyper-rush.description=Obtenez une poussée de vitesse élevée pendant une courte durée.
champions.ability.lifesteal.name=Vol de vie
champions.ability.lifesteal.description=Soignez-vous d''une partie des dégâts infligés à un ennemi en mêlée.
champions.ability.magnetism.name=Magnétisme
champions.ability.magnetism.description=Génère un cône de particules devant vous qui attire les entités vers l''intérieur.
champions.ability.regeneration.name=Régénération
champions.ability.regeneration.description=Obtenez un léger effet de régénération pendant une courte durée.
champions.ability.shield.name=Bouclier
champions.ability.shield.description=Obtenez un effet de régénération amplifié en utilisant cette capacité.
champions.ability.magnetic-pull.name=Attraction magnétique
champions.ability.magnetic-pull.description=Les ennemis touchés par cette arme sont attirés vers l''intérieur au lieu d''être repoussés.
champions.ability.skyforged-ascent.name=Ascension céleste forgée
champions.ability.skyforged-ascent.description=Lancez l''arme pour monter vers le ciel, chevauchant sa force divine et gagnant une impulsion de vitesse.
champions.ability.speed-boost.name=Boost de vitesse
champions.ability.speed-boost.description=Obtenez un léger effet de vitesse pendant une courte durée.
champions.ability.throwing-web.name=Toile lancée
champions.ability.throwing-web.description=Lancez une toile qui place temporairement des toiles d''araignée à l''impact. Peut être utilisée pour piéger des ennemis.
champions.ability.tilling-tremor.name=Tremblement de labour
champions.ability.tilling-tremor.description=Récoltez des cultures dans un petit rayon. Les ennemis dans la zone subiront des dégâts et seront repoussés.
champions.ability.underwater-breathing.name=Respiration sous-marine
champions.ability.underwater-breathing.description=Accorde une respiration sous-marine instantanée lorsque cet objet est tenu dans l''eau.
champions.ability.vine-snare.name=Piège de liane
champions.ability.vine-snare.description=Les projectiles libèrent des lianes qui enserrent les ennemis et les ancrent au sol.
champions.ability.voltic-bash.name=Coup voltique
champions.ability.voltic-bash.description=Chargez et foncez en avant, infligeant des dégâts aux entités sur votre passage. Une charge plus élevée augmente les dégâts et la vitesse.
champions.ability.water-damage.name=Dégâts aquatiques
champions.ability.water-damage.description=Augmente les dégâts des attaques de mêlée dans l''eau d''un montant fixe.
champions.ability.wind-dash.name=Ruée du vent
champions.ability.wind-dash.description=Faites un bond en avant. Le premier ennemi touché sera projeté dans les airs.
champions.ability.wind-slash.name=Taillade du vent
champions.ability.wind-slash.description=Tirez 3 rafales de vent. Lorsqu''elles touchent un ennemi, récupérez de l''énergie et infligez-lui des dégâts.
champions.ability.nectar-of-decay.name=Nectar de déclin
champions.ability.nectar-of-decay.description=Déchaînez une floraison toxique qui explose en un nuage de poison qui se répand, aspirant la santé des ennemis pour restaurer la vôtre.
champions.ability.soul-harvest.name=Moisson d''âmes
champions.ability.soul-harvest.description=Collectez les âmes des joueurs et des mobs tombés pour récolter leurs âmes, gagnant des dégâts et de la vitesse.
champions.ability.hunters-brand.name=Marque du chasseur
champions.ability.hunters-brand.description=Effectuez 2 réinitialisations consécutives de Needlegrasp sur la même cible pour déclencher un état de frénésie. Inflige également des dégâts bonus aux ennemis empoisonnés.
champions.ability.needlegrasp.name=Needlegrasp
champions.ability.needlegrasp.description=Lancez une liane qui vous attire et attire un ennemi l''un vers l''autre. Frappez-le avec une attaque de mêlée pour réinitialiser votre temps de recharge.
champions.ability.vipersprint.name=Vipersprint
champions.ability.vipersprint.description=Foncez en avant à grande vitesse, courbant votre trajectoire avec votre visée tout en tranchant tout sur votre passage. Toucher un ennemi réinitialise votre temps de recharge.
champions.ability.healing-nova.name=Nova de soin
champions.ability.healing-nova.description=Lance une nova qui soigne les alliés proches de {0} {1} à l''atterrissage.
champions.ability.meridian-beam.name=Rayon méridien
champions.ability.meridian-beam.description=Tire un rayon d''énergie dévastateur qui se déplace en ligne droite.
champions.ability.equip.name=Équiper
champions.ability.equip.description=Passe instantanément à la classe {0}. Ne fonctionne pas en combat. L''armure stockée sur cet objet sera équipée.

