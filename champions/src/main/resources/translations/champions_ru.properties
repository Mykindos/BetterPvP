# Ability display (interaction lore)
champions.ability.replace-armor.name=Заменить броню
champions.ability.replace-armor.description=Добавить или убрать снаряжение, хранящееся на этом предмете.
champions.ability.batto-do.name=Батто-До
champions.ability.batto-do.description=Рвитесь вперёд и поражайте цели на своём пути, нанося урон, отбрасывая их и поджигая.
champions.ability.black-hole.name=Чёрная дыра
champions.ability.black-hole.description=Создаёт чёрную дыру, притягивающую ближайшие существа на короткое время.
champions.ability.cleanse.name=Очищение
champions.ability.cleanse.description=Снимает негативные эффекты и даёт иммунитет на короткое время.
champions.ability.dodge.name=Уклонение
champions.ability.dodge.description=Быстро уклоняйтесь горизонтально, чтобы избежать входящих атак.
champions.ability.effect-roulette.name=Рулетка эффектов
champions.ability.effect-roulette.description=Предоставляет случайный эффект на короткое время. Эффект может быть положительным или отрицательным.
champions.ability.energy-boost.name=Энергетический буст
champions.ability.energy-boost.description=Мгновенно предоставляет фиксированный энергетический буст при использовании.
champions.ability.feather-feet.name=Лёгкие ноги
champions.ability.feather-feet.description=Предотвращает весь урон от падения, пока вы держите этот предмет.
champions.ability.gator-stroke.name=Удар крокодила
champions.ability.gator-stroke.description=Разгоняет пользователя с высокой скоростью. Эта способность работает только в воде.
champions.ability.hard-slash.name=Жёсткий удар
champions.ability.hard-slash.description=Нанесите урон ближайшим врагам и отбросьте их огненным ударом.
champions.ability.heavensplitter.name=Небораскол
champions.ability.heavensplitter.description=Бросьте оружие, призовите силу Тора и нанесите урон врагам на его пути.
champions.ability.hyper-rush.name=Гиперрывок
champions.ability.hyper-rush.description=Получите кратковременный высокоскоростной рывок.
champions.ability.lifesteal.name=Похищение жизни
champions.ability.lifesteal.description=Восстанавливайте часть урона, нанесённого врагу атаками ближнего боя.
champions.ability.magnetism.name=Магнетизм
champions.ability.magnetism.description=Создаёт конус частиц перед вами, притягивающий существ внутрь.
champions.ability.regeneration.name=Регенерация
champions.ability.regeneration.description=Получите небольшой эффект регенерации на короткое время.
champions.ability.shield.name=Щит
champions.ability.shield.description=Получите усиленный эффект регенерации при использовании этой способности.
champions.ability.magnetic-pull.name=Магнитное притяжение
champions.ability.magnetic-pull.description=Враги, поражённые этим оружием, притягиваются внутрь вместо того, чтобы быть отброшенными.
champions.ability.skyforged-ascent.name=Небесный подъём
champions.ability.skyforged-ascent.description=Бросьте оружие, чтобы взлететь в небо, оседлав его божественную силу и получив всплеск скорости.
champions.ability.speed-boost.name=Ускорение
champions.ability.speed-boost.description=Получите небольшой эффект скорости на короткое время.
champions.ability.throwing-web.name=Бросок паутины
champions.ability.throwing-web.description=Бросьте паутину, которая временно оставляет кобвебы при попадании. Можно использовать для ловушки врагов.
champions.ability.tilling-tremor.name=Сейсмический плуг
champions.ability.tilling-tremor.description=Собирайте урожай в небольшом радиусе. Враги в зоне получат урон и будут отброшены.
champions.ability.underwater-breathing.name=Подводное дыхание
champions.ability.underwater-breathing.description=Мгновенно даёт возможность дышать под водой при удержании этого предмета в воде.
champions.ability.vine-snare.name=Ловушка из лоз
champions.ability.vine-snare.description=Снаряды высвобождают лозы, которые опутывают врагов и приковывают их к земле.
champions.ability.voltic-bash.name=Вольтический удар
champions.ability.voltic-bash.description=Зарядитесь и бросьтесь вперёд, нанося урон существам на пути. Более высокий заряд увеличивает урон и скорость.
champions.ability.water-damage.name=Водный урон
champions.ability.water-damage.description=Увеличивает урон от ближних атак в воде на фиксированную величину.
champions.ability.wind-dash.name=Ветровой рывок
champions.ability.wind-dash.description=Сделайте прыжок вперёд. Первый враг, которого вы ударите, будет подброшен в воздух.
champions.ability.wind-slash.name=Ветровой удар
champions.ability.wind-slash.description=Выпустите 3 порыва ветра. При попадании во врага восстановите немного энергии и нанесите ему урон.
champions.ability.nectar-of-decay.name=Нектар гниения
champions.ability.nectar-of-decay.description=Высвободите ядовитый цветок, который взрывается в расширяющееся ядовитое облако, высасывая здоровье врагов для восстановления своего.
champions.ability.soul-harvest.name=Жатва душ
champions.ability.soul-harvest.description=Собирайте души павших игроков и мобов, чтобы пожать их души, получая урон и скорость.
champions.ability.hunters-brand.name=Метка охотника
champions.ability.hunters-brand.description=Выполните 2 последовательных сброса Needlegrasp на одну цель, чтобы вызвать состояние ярости. Также наносит бонусный урон отравленным врагам.
champions.ability.needlegrasp.name=Needlegrasp
champions.ability.needlegrasp.description=Бросьте лозу, которая притянет вас и врага друг к другу. Ударьте врага ближней атакой, чтобы сбросить перезарядку.
champions.ability.vipersprint.name=Vipersprint
champions.ability.vipersprint.description=Бросьтесь вперёд на высокой скорости, изгибая путь прицелом и разрезая всё на своём пути. Попадание по врагу сбрасывает перезарядку.
champions.ability.healing-nova.name=Лечебная нова
champions.ability.healing-nova.description=Запускает нову, исцеляющую ближайших союзников на {0} {1} при приземлении.
champions.ability.meridian-beam.name=Меридиональный луч
champions.ability.meridian-beam.description=Выпускает разрушительный луч энергии, летящий по прямой линии.
champions.ability.equip.name=Надеть
champions.ability.equip.description=Мгновенно переключается на класс {0}. Не работает в бою. Броня, хранящаяся на этом предмете, будет надета.

