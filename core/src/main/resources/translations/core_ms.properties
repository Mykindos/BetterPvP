## Champions roles (class display names)
core.role.assassin.name=Assassin
core.role.knight.name=Knight
core.role.brute.name=Brute
core.role.ranger.name=Ranger
core.role.mage.name=Mage
core.role.warlock.name=Warlock
core.role.assassin.description=Assassin ialah kelas yang laju dan lincah. Dengan kesihatan yang agak rendah dan kelemahan yang ketara, kelas ini tidak mudah dimainkan. Paling sesuai untuk menyerang musuh yang cuai atau sedang sibuk, ia akan sukar menghadapi musuh yang bersedia.
core.role.knight.description=Knight ialah kelas yang kuat dan agresif. Ia cemerlang semasa menyerang, dengan pilihan untuk meningkatkan kerosakan, sambil turut mempunyai beberapa kemampuan untuk bertahan cukup lama bagi menewaskan lawan.
core.role.brute.description=Brute ialah kelas yang sangat teguh dan jarang terdorong oleh orang lain. Ia mempunyai kawalan orang ramai dan kemampuan bertahan yang baik.
core.role.ranger.description=Ranger ialah kelas jarak jauh yang mahir menggunakan busur. Terdapat pelbagai pilihan yang memberi ganjaran kepada ketepatan, kesabaran, atau ketepatan jarak jauh.
core.role.mage.description=Mage ialah kelas yang mahir dengan pelbagai elemen. Pilih antara kehidupan, ais, api, dan bumi untuk menyokong rakan sepasukan, memerangkap musuh, dan membunuh mereka.
core.role.warlock.description=Warlock ialah kelas yang berfokus pada kesihatan. Sesetengah kemampuan memerlukan pengorbanan kesihatan, manakala yang lain menghukum musuh yang berdekatan dan mempunyai kesihatan rendah.

