clans.tutorial.core-trust= et optionnellement leur faire confiance en exécutant
clans.tutorial.alliance-limit=Vous ne pouvez avoir que {0} joueurs entre {1} et {2} {3}. Voir
clans.tutorial.alliance-help= pour plus d''informations sur les commandes de clan.
clans.tutorial.map-intro=Il y a quelques zones différentes à explorer dans le monde. Utilisez
clans.tutorial.map-info= pour voir la carte et vous repérer. Les cartes montrent vos alliés de clan. Pendant un pillage, elles montrent aussi les ennemis.
clans.tutorial.shops=Dans chaque direction cardinale se trouve un {0} qui contient {1}. Ici, vous pouvez vendre la plupart des objets, acheter des biens essentiels, accéder aux donjons et changer de classe.\nVous pouvez vous téléporter ici depuis le spawn du monde.
clans.tutorial.fields=Au centre de la carte se trouve {0}. Une zone très fréquentée où vous pouvez trouver des minerais, des endroits pour pêcher et un téléporteur vers les événements.
clans.tutorial.events=Des événements se produisent périodiquement, accessibles via le portail dans {0}. Ces événements peuvent faire tomber {1}. Ce sont des armes puissantes et spéciales, dotées de capacités uniques. Vous pouvez aussi trouver des runes et des jetons de donjon ici.
clans.tutorial.classes=Il y a actuellement {0} {1} {2}, un pour chaque ensemble d''armure. Chacun a ses forces et ses faiblesses. Il y a de nombreux {3} différents à choisir, sélectionnez ceux qui correspondent le mieux à votre style de jeu. Vous pouvez ajuster {4} pour n''importe quel {5} à une table d''enchantement.
clans.tutorial.custom-items=Il existe des objets personnalisés que vous pouvez trouver, acheter ou crafter. Vous pouvez voir les objets craftables et leurs recettes en exécutant
clans.tutorial.custom-items-info=. Ces objets peuvent être utilisés pour vous donner un avantage au combat ou pour vous aider à collecter des ressources.
clans.tutorial.custom-items-rare=Certains de ces objets ne sont disponibles que depuis des événements, des donjons ou des raids, donc gardez l''œil ouvert.
clans.tutorial.reinforced=Les classes/kits sont identifiés par l''armure, vous avez automatiquement une classe. Vous pouvez crafter l''ensemble d''armure spécifique pour obtenir l''ensemble renforcé. Vous ne pouvez porter que l''ensemble renforcé de votre classe. Les pièces renforcées donnent une santé accrue.
clans.tutorial.upgraded-weapons=Vos armes de base peuvent être améliorées. {0} (faites avec des blocs d''or) ou {1} (faites avec des blocs de diamant). {2} augmente le {3} concerné de {4} et {5} augmente les dégâts de {6}. Les armes {7} (trouvées lors d''événements) combinent les effets des deux!
clans.tutorial.progression=Il y a plus que le combat, vous pouvez aussi progresser dans d''autres domaines. Améliorez votre progression dans {0}, {1}, et {2}
clans.tutorial.fishing-title=Pêche
clans.tutorial.fishing=Prenez votre canne et lancez-la dans {0}, pêchez des poissons et des trésors. Montez de niveau avec vos prises, lancez des appâts pour attirer les poissons et améliorez votre canne pour attraper des poissons plus lourds. Vendez votre prise dans les boutiques, ou rapportez votre trésor chez vous.
clans.tutorial.mining-title=Minage
clans.tutorial.mining=Prenez votre pioche et dirigez-vous vers les mines, car des richesses vous y attendent. Gagnez de l''expérience, avec 5x plus dans {0}. Les niveaux plus élevés mènent à plus de butin et des vitesses de minage plus rapides.
clans.tutorial.woodcutting-title=Bûcheronnage
clans.tutorial.woodcutting=Prenez votre hache et trouvez un arbre à couper. Montez de niveau à chaque bûche coupée, vous donnant accès à de nouveaux avantages et capacités.
clans.tutorial.good-luck=Bonne chance dans vos aventures et n''oubliez pas de vous amuser.

