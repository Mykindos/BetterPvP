clans.tutorial.map-intro=세계에는 탐험할 수 있는 여러 지역이 있습니다.
clans.tutorial.map-info= 을 사용하여 지도를 확인하고 길을 찾으세요. 지도에는 클랜원이 표시됩니다. 약탈 중에는 적도 표시됩니다.
clans.tutorial.shops=각 방위에는 {1}이(가) 포함된 {0}이(가) 있습니다. 여기서 대부분의 아이템을 팔고, 필수품을 구매하고, 던전에 접근하고, 직업을 변경할 수 있습니다.\n월드 스폰에서 이곳으로 텔레포트할 수 있습니다.
clans.tutorial.fields=지도 중심에는 {0}이(가) 있습니다. 유동인구가 많은 지역으로, 광석, 낚시터, 이벤트 텔레포터를 찾을 수 있습니다.
clans.tutorial.events=주기적으로 이벤트가 열리며, {0}의 포털을 통해 접근할 수 있습니다. 이 이벤트에서는 {1}이(가) 드롭됩니다. 독특한 능력을 가진 강력한 특수 무기입니다. 여기서 룬과 던전 토큰도 찾을 수 있습니다.
clans.tutorial.classes=현재 {0}{1}이(가) {2}개 있으며, 각 방어구 세트에 대응합니다. 각각 장단점이 있습니다. 다양한 {3} 중에서 선택할 수 있으며, 자신의 플레이스타일에 맞는 것을 골라보세요. 인챈트 테이블에서 모든 {5}의 {4}을(를) 조정할 수 있습니다.
clans.tutorial.custom-items=찾거나, 구매하거나, 제작할 수 있는 커스텀 아이템이 있습니다. 다음 명령어를 실행하여 제작 가능한 아이템과 레시피를 확인할 수 있습니다
clans.tutorial.custom-items-info=. 이 아이템들은 전투에서 우위를 점하거나 자원 수집을 돕는 데 사용할 수 있습니다.
clans.tutorial.custom-items-rare=이 중 일부 아이템은 이벤트, 던전, 또는 습격에서만 얻을 수 있으니 주의하세요.
clans.tutorial.reinforced=클래스/키트는 방어구로 식별되며, 자동으로 클래스가 부여됩니다. 특정 방어구 세트를 제작하여 강화 세트를 얻을 수 있습니다. 자신의 클래스의 강화 세트만 착용할 수 있습니다. 강화 부품은 최대 체력을 증가시킵니다.
clans.tutorial.upgraded-weapons=기본 무기를 업그레이드할 수 있습니다. {0}(금 블록으로 제작) 또는 {1}(다이아몬드 블록으로 제작). {2}는 관련 {3}을(를) {4} 증가시키고, {5}는 데미지를 {6} 증가시킵니다. {7}무기(이벤트에서 획득)는 두 효과를 결합합니다!
clans.tutorial.progression=전투뿐만 아니라 다른 분야도 레벨업할 수 있습니다. {0}, {1}, {2}에서 진행도를 레벨업하세요
clans.tutorial.fishing-title=낚시
clans.tutorial.fishing=낚싯대를 들고 {0}으로 가서 물고기와 보물을 찾아보세요. 낚시로 레벨업하고, 미끼를 던져 물고기를 유인하고, 낚싯대를 업그레이드하여 더 무거운 물고기를 잡으세요. 잡은 물고기는 상점에서 팔거나 보물을 집에 가져가세요.
clans.tutorial.mining-title=채광
clans.tutorial.mining=곡괭이를 들고 광산으로 향하세요, 그곳에는 풍부한 자원이 있습니다. 경험치를 획득하고, {0}에서는 5배의 경험치를 얻을 수 있습니다. 레벨이 높을수록 더 많은 드롭과 빠른 채광 속도를 얻습니다.
clans.tutorial.woodcutting-title=벌목
clans.tutorial.woodcutting=도끼를 들고 나무를 찾아 베세요. 원목을 벨 때마다 레벨업하여 새로운 특전과 능력을 해금합니다.
clans.tutorial.good-luck=모험에 행운을 빕니다. 즐겁게 플레이하세요.

