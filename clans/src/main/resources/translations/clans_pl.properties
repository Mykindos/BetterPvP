clans.tutorial.difficulty={0} może być trudną grą, możliwe jest stracenie wszystkiego i zaczęcie od nowa. Nie jest to powszechne, ale może się zdarzyć. {1} są okresowo resetowane i wszyscy zaczynają od nowa.
clans.tutorial.enjoy=Ciesz się grą tak, jak chcesz grać, nie ma właściwego sposobu gry w {0}. Jeśli lubisz {1}, {2}, {3}, {4} i więcej, jest coś dla ciebie.\nGraj z maksymalnie {5} znajomymi i sprawdź, dokąd zaprowadzi cię przygoda.
clans.tutorial.clan-core={0} to {1}. Możesz go stworzyć, wykonując
