# Ability display (interaction lore)
champions.ability.replace-armor.name=방어구 교체
champions.ability.replace-armor.description=이 아이템에 저장된 장비를 추가하거나 제거합니다.
champions.ability.batto-do.name=발도도
champions.ability.batto-do.description=앞으로 돌진하며 경로의 대상을 공격해 피해를 주고 밀쳐내며 불을 붙입니다.
champions.ability.black-hole.name=블랙홀
champions.ability.black-hole.description=짧은 시간 동안 주변 개체를 끌어당기는 블랙홀을 생성합니다.
champions.ability.cleanse.name=정화
champions.ability.cleanse.description=부정적 효과를 제거하고 짧은 시간 동안 면역을 부여합니다.
champions.ability.dodge.name=회피
champions.ability.dodge.description=수평으로 빠르게 대시하여 공격을 피합니다.
champions.ability.effect-roulette.name=효과 룰렛
champions.ability.effect-roulette.description=짧은 시간 동안 무작위 효과를 부여합니다. 긍정적 또는 부정적 효과일 수 있습니다.
champions.ability.energy-boost.name=에너지 부스트
champions.ability.energy-boost.description=사용 시 즉시 일정량의 에너지를 제공합니다.
champions.ability.feather-feet.name=깃털 발
champions.ability.feather-feet.description=이 아이템을 들고 있는 동안 낙하 피해를 완전히 방지합니다.
champions.ability.gator-stroke.name=게이터 스트로크
champions.ability.gator-stroke.description=사용자를 고속으로 추진시킵니다. 이 능력은 물속에서만 작동합니다.
champions.ability.hard-slash.name=강타 베기
champions.ability.hard-slash.description=주변 적에게 피해를 주고 불꽃 베기로 밀쳐냅니다.
champions.ability.heavensplitter.name=천공 참
champions.ability.heavensplitter.description=무기를 던져 토르의 힘을 소환하고 경로의 적에게 피해를 줍니다.
champions.ability.hyper-rush.name=하이퍼 러시
champions.ability.hyper-rush.description=짧은 시간 동안 고속 이동 효과를 얻습니다.
champions.ability.lifesteal.name=생명 흡수
champions.ability.lifesteal.description=근접 공격으로 적에게 준 피해의 일부를 회복합니다.
champions.ability.magnetism.name=자기력
champions.ability.magnetism.description=앞쪽에 입자 원뿔을 생성하여 개체를 안쪽으로 끌어당깁니다.
champions.ability.regeneration.name=재생
champions.ability.regeneration.description=짧은 시간 동안 소량의 재생 효과를 얻습니다.
champions.ability.shield.name=방패
champions.ability.shield.description=이 능력 사용 중 증폭된 재생 효과를 얻습니다.
champions.ability.magnetic-pull.name=자기 당김
champions.ability.magnetic-pull.description=이 무기에 맞은 적은 밀려나는 대신 안쪽으로 끌립니다.
champions.ability.skyforged-ascent.name=하늘 단조 승천
champions.ability.skyforged-ascent.description=무기를 던져 하늘로 솟구치며 신성한 힘을 타고 순간적인 속도 증가를 얻습니다.
champions.ability.speed-boost.name=속도 증가
champions.ability.speed-boost.description=짧은 시간 동안 약간의 속도 효과를 얻습니다.
champions.ability.throwing-web.name=거미줄 투척
champions.ability.throwing-web.description=착탄 시 일시적으로 거미줄을 설치하는 그물을 던집니다. 적을 가두는 데 사용할 수 있습니다.
champions.ability.tilling-tremor.name=경작 진동
champions.ability.tilling-tremor.description=작은 반경 내의 작물을 수확합니다. 범위 내 적은 피해를 받고 밀려납니다.
champions.ability.underwater-breathing.name=수중 호흡
champions.ability.underwater-breathing.description=물속에서 이 아이템을 들고 있으면 즉시 수중 호흡을 부여합니다.
champions.ability.vine-snare.name=덩굴 올가미
champions.ability.vine-snare.description=볼트가 덩굴을 방출하여 적을 얽어매고 땅에 고정시킵니다.
champions.ability.voltic-bash.name=번개 돌진
champions.ability.voltic-bash.description=차지 후 앞으로 돌진하여 경로상의 개체에 피해를 줍니다. 차지가 높을수록 피해와 속도가 증가합니다.
champions.ability.water-damage.name=수중 피해
champions.ability.water-damage.description=물속에서 근접 공격 피해를 고정량 증가시킵니다.
champions.ability.wind-dash.name=바람 질주
champions.ability.wind-dash.description=앞으로 도약합니다. 처음 맞은 적은 공중으로 날아갑니다.
champions.ability.wind-slash.name=바람 베기
champions.ability.wind-slash.description=3개의 바람 충격파를 발사합니다. 적에게 맞으면 에너지를 회복하고 피해를 줍니다.
champions.ability.nectar-of-decay.name=부패의 넥타
champions.ability.nectar-of-decay.description=독성 꽃을 방출하여 퍼지는 독구름을 만들고 적의 체력을 흡수해 자신을 회복합니다.
champions.ability.soul-harvest.name=영혼 수확
champions.ability.soul-harvest.description=쓰러진 플레이어와 몹의 영혼을 수집하여 피해와 속도를 높입니다.
champions.ability.hunters-brand.name=사냥꾼의 낙인
champions.ability.hunters-brand.description=같은 대상에게 니들그래스프 리셋을 2회 연속 성공시켜 광란 상태를 발동합니다. 독 상태의 적에게 추가 피해도 줍니다.
champions.ability.needlegrasp.name=니들그래스프
champions.ability.needlegrasp.description=덩굴을 던져 자신과 적을 서로 끌어당깁니다. 근접 공격으로 적을 맞추면 쿨다운이 초기화됩니다.
champions.ability.vipersprint.name=바이퍼스프린트
champions.ability.vipersprint.description=고속으로 앞으로 돌진하며 조준 방향으로 경로를 구부려 모든 것을 관통합니다. 적을 맞추면 쿨다운이 초기화됩니다.
champions.ability.healing-nova.name=치유 노바
champions.ability.healing-nova.description=착탄 시 주변 아군을 {0} {1} 회복시키는 노바를 발사합니다.
champions.ability.meridian-beam.name=경락 광선
champions.ability.meridian-beam.description=직선으로 이동하는 피해 에너지 광선을 발사합니다.
champions.ability.equip.name=장착
champions.ability.equip.description=즉시 {0} 클래스로 전환합니다. 전투 중에는 사용할 수 없습니다. 이 아이템에 저장된 방어구가 장착됩니다.

