clans.tutorial.shops=في كل اتجاه أساسي يوجد {0} يحتوي على {1}. هنا يمكنك بيع معظم الأشياء، وشراء البضائع الأساسية، والوصول إلى الأبراج، وتغيير فئتك.\nيمكنك الانتقال هنا من نقطة تفريغ العالم.
clans.tutorial.fields=في وسط الخريطة يوجد {0}. منطقة ذات حركة مرور عالية، حيث يمكنك العثور على خامات وأماكن للصيد ومنقل للأحداث.
clans.tutorial.events=تقع أحداث بشكل دوري يمكنك الوصول إليها عبر البوابة في {0}. يمكن لهذه الأحداث إسقاط {1}. هذه أسلحة قوية وخاصة مزودة بقدرات فريدة. يمكنك أيضاً إيجاد الرونات ورموز الأبراج هنا.
clans.tutorial.classes=يوجد حالياً {0} {1} {2}، واحد لكل مجموعة درع. لكل منها نقاط قوة وضعف. هناك العديد من {3} المختلفة للاختيار، اختر التي تناسب أسلوب لعبك أكثر. يمكنك ضبط {4} لأي {5} على طاولة التعفير.
clans.tutorial.custom-items=هناك عناصر مخصصة يمكنك العثور عليها أو شرائها أو صنعها. يمكنك رؤية العناصر القابلة للصنع ووصفاتها بتشغيل
clans.tutorial.custom-items-info=. يمكن استخدام هذه العناصر لمنحك ميزة في القتال، أو مساعدتك في جمع الموارد.
clans.tutorial.custom-items-rare=بعض هذه العناصر متاح فقط من الأحداث أو الأبراج أو الغارات، لذا ابقَ يقظاً.
clans.tutorial.reinforced=تُعرَّف الفصائل/المجموعات بالدروع، لديك فئة تلقائياً. يمكنك صنع مجموعة الدروع المحددة للحصول على المجموعة المعززة. يمكنك فقط ارتداء المجموعة المعززة لفئتك. القطع المعززة تمنح صحة أكبر.
clans.tutorial.upgraded-weapons=يمكن ترقية أسلحتك الأساسية. {0} (مصنوعة من كتل ذهبية) أو {1} (مصنوعة من كتل الماس). {2} تزيد {3} ذات الصلة بمقدار {4} و{5} تزيد الضرر بمقدار {6}. أسلحة {7} (من الأحداث) تجمع تأثيرات كليهما!
clans.tutorial.progression=هناك أكثر من مجرد قتال، يمكنك أيضاً الارتقاء في مجالات أخرى. ارفع مستوى تقدمك في {0} و{1} و{2}
clans.tutorial.fishing-title=الصيد
clans.tutorial.fishing=خذ قضيبك وألقِه في {0}، صِد الأسماك والكنوز. ارتقِ بصيدك، ألقِ الطعوم لاستدراج الأسماك، وقم بترقية قضيبك لصيد أسماك أثقل. خذ صيدك وبعه في المحلات، أو خذ كنزك للمنزل.
clans.tutorial.mining-title=التعدين
clans.tutorial.mining=خذ معولك وتوجه إلى المناجم، فهناك ثروات في انتظارك. اكسب خبرة، بـ 5x أكثر في {0}. تؤدي المستويات الأعلى إلى مزيد من المكافآت وسرعات تعدين أسرع.
clans.tutorial.woodcutting-title=قطع الأشجار
clans.tutorial.woodcutting=خذ فأسك وابحث عن شجرة لقطعها. ارتقِ بكل خشبة تقطعها، مما يمنحك وصولاً إلى مزايا وقدرات جديدة.
clans.tutorial.good-luck=حظاً موفقاً في مغامراتك وتذكر أن تستمتع.

