clans.tutorial.custom-items=Hay objetos personalizados que puedes encontrar, comprar o fabricar. Puedes ver los objetos fabricables y sus recetas ejecutando
clans.tutorial.custom-items-info=. Estos objetos pueden usarse para darte ventaja en combate, o para ayudarte a recolectar recursos.
clans.tutorial.custom-items-rare=Algunos de estos objetos solo están disponibles en eventos, mazmorras o incursiones, así que mantente atento a ellos.
clans.tutorial.reinforced=Las Clases/Kits se identifican por la armadura, automáticamente tienes una clase. Puedes fabricar el conjunto de armadura específico para obtener el conjunto reforzado. Solo puedes llevar el conjunto reforzado de tu clase. Las piezas reforzadas otorgan más salud.
clans.tutorial.upgraded-weapons=Tus armas básicas pueden mejorarse. {0} (hechas con bloques de oro) o {1} (hechas con bloques de diamante). {2} aumentan el {3} correspondiente en {4} y {5} aumenta el daño en {6}. ¡Las armas {7} (encontradas en eventos) combinan los efectos de ambas!
clans.tutorial.progression=Hay más que solo combate, también puedes subir de nivel en otras áreas. Sube tu Progresión en {0}, {1} y {2}
clans.tutorial.fishing-title=Pesca
clans.tutorial.fishing=Toma tu caña y lánzala al {0}, buscando peces y tesoros. Sube de nivel con tus capturas, lanza cebos para atraer peces y mejora tu caña para atrapar peces más pesados. Toma tu captura y véndela en las tiendas, o lleva tu tesoro a casa.
clans.tutorial.mining-title=Minería
clans.tutorial.mining=Toma tu pico y dirígete a las minas, pues hay riquezas esperando. Gana experiencia, con 5 veces más en {0}. Los niveles más altos llevan a más botín y velocidades de minado más rápidas.
clans.tutorial.woodcutting-title=Tala
clans.tutorial.woodcutting=Toma tu hacha y encuentra un árbol para talar. Sube de nivel con cada tronco que talas, dándote acceso a nuevas ventajas y habilidades.
clans.tutorial.good-luck=Buena suerte en tus aventuras y recuerda divertirte.
