## Champions roles (class display names)
core.role.assassin.name=Assassine
core.role.knight.name=Ritter
core.role.brute.name=Brutale
core.role.ranger.name=Waldläufer
core.role.mage.name=Magier
core.role.warlock.name=Hexenmeister
core.role.assassin.description=Der Assassine ist eine schnelle und wendige Klasse. Mit relativ geringer Gesundheit und starken Gegenmaßnahmen ist dies keine einfache Klasse im direkten Kampf. Am besten geeignet für Angriffe auf abgelenkte oder anderweitig beschäftigte Feinde; wird gegen vorbereitete Gegner Schwierigkeiten haben.
core.role.knight.description=Der Ritter ist eine starke, aggressive Klasse. Er gedeiht im Angriff, hat Optionen zur Schadenserhöhung und einige Fähigkeiten, die ihn lange genug am Leben halten, um seinen Gegner zu töten.
core.role.brute.description=Die Brutale ist ein Kraftpaket, das selten von anderen bewegt wird. Sie verfügt über gute Crowd-Control- und Verteidigungsfähigkeiten.
core.role.ranger.description=Der Waldläufer ist eine Fernkampfklasse, die im Umgang mit dem Bogen versiert ist. Es gibt verschiedene Optionen, die Präzision, Geduld oder Treffsicherheit auf lange Distanz belohnen.
core.role.mage.description=Der Magier ist eine Klasse mit verschiedenen Elementen. Wähle zwischen Leben, Eis, Feuer und Erde, um deine Teamkameraden zu unterstützen, den Feind zu fangen und zu töten.
core.role.warlock.description=Der Hexenmeister ist eine auf Gesundheit ausgerichtete Klasse. Einige Fähigkeiten erfordern das Opfern von Gesundheit, andere bestrafen Feinde für Nähe und niedrige Gesundheit.

