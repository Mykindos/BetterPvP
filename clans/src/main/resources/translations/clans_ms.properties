clans.tutorial.toc-title=Jadual kandungan
clans.tutorial.difficulty={0} boleh menjadi permainan yang sukar, adalah mungkin untuk kehilangan segalanya dan bermula dari awal. Ini tidak biasa, tetapi boleh berlaku. {1} diset semula secara berkala, dan semua orang bermula dari awal.
clans.tutorial.enjoy=Nikmati permainan mengikut cara anda, tiada cara yang betul untuk bermain {0}. Jika anda suka {1}, {2}, {3}, {4}, dan lain-lain, ada sesuatu untuk anda.\nBermain dengan sehingga {5} rakan dan lihat ke mana perjalanan anda membawa.
clans.tutorial.clan-core={0} ialah {1}. Anda boleh membuat satu dengan menjalankan
clans.tutorial.clan-invite=, jemput rakan dengan menjalankan
clans.tutorial.clan-join=, dan sertai {0} yang anda dijemput dengan menjalankan
clans.tutorial.territory-claim={0} boleh menuntut wilayah dengan menjalankan
clans.tutorial.territory-info=, yang boleh anda gunakan untuk menyimpan item. {0}{1} boleh menggunakan meriam untuk mengepung anda, selepas mencapai {2}{3} ke atas anda.
clans.tutorial.related-commands=Arahan berkaitan:
clans.tutorial.core-set=Dalam wilayah anda, anda boleh menetapkan lokasi dengan menjalankan
clans.tutorial.core-teleport= yang boleh anda teleport balik dengan menjalankan
