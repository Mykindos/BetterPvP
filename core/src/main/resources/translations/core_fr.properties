## Champions roles (class display names)
core.role.assassin.name=Assassin
core.role.knight.name=Chevalier
core.role.brute.name=Brute
core.role.ranger.name=Ranger
core.role.mage.name=Mage
core.role.warlock.name=Démoniste
core.role.assassin.description=L''Assassin est une classe rapide et agile. Avec une santé relativement faible et des faiblesses prononcées, il n''est pas facile de jouer cette classe en mêlée directe. Il convient mieux pour attaquer les ennemis distraits ou occupés, et aura du mal contre les ennemis préparés.
core.role.knight.description=Le Chevalier est une classe forte et agressive. Il excelle dans l''attaque, avec des options pour augmenter les dégâts, tout en ayant quelques capacités pour rester en vie assez longtemps pour tuer son adversaire.
core.role.brute.description=La Brute est une force de frappe rarement ébranlée. Elle dispose d''un bon contrôle de foule et de capacités défensives.
core.role.ranger.description=Le Ranger est une classe à distance spécialisée dans l''arc. Il existe différentes options récompensant la précision, la patience ou la précision à longue distance.
core.role.mage.description=Le Mage est une classe habile avec différents éléments. Choisissez entre la vie, la glace, le feu et la terre pour soutenir vos coéquipiers, piéger l''ennemi et le tuer.
core.role.warlock.description=Le Démoniste est une classe axée sur la santé. Certaines capacités nécessitent un sacrifice de points de vie, d''autres punissent les ennemis pour leur proximité et leur faible santé.

