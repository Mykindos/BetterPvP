clans.tutorial.toc-title=Inhaltsverzeichnis
clans.tutorial.difficulty={0} kann ein schwieriges Spiel sein, es ist möglich, alles zu verlieren und von vorne anzufangen. Das ist nicht häufig, kann aber passieren. {1} werden regelmäßig zurückgesetzt, und alle starten von vorne.
clans.tutorial.enjoy=Genieße das Spiel so, wie du es spielen möchtest, es gibt keine richtige Weise, {0} zu spielen. Wenn du {1}, {2}, {3}, {4} und mehr magst, ist etwas für dich dabei.\nSpiele mit bis zu {5} Freunden und sieh, wohin deine Reise führt.
clans.tutorial.clan-core={0} ist der {1}. Du kannst einen erstellen, indem du ausführst
clans.tutorial.clan-invite=, lade Freunde ein, indem du ausführst
clans.tutorial.clan-join=, und tritt einem {0}, zu dem du eingeladen wurdest, bei, indem du ausführst
clans.tutorial.territory-claim={0} kann Territorium beanspruchen, indem du ausführst
clans.tutorial.territory-info=, die du zum Lagern von Gegenständen verwenden kannst. {0} {1} können Kanonen einsetzen, um dich zu belagern, nachdem sie {2} {3} auf dir erreicht haben.
clans.tutorial.related-commands=Verwandte Befehle:
clans.tutorial.core-set=In deinem Territorium kannst du einen Ort festlegen, indem du ausführst
clans.tutorial.core-teleport= zu dem du teleportieren kannst, indem du ausführst
clans.tutorial.core-ally=. Du kannst {0} mit anderen {1} eingehen, indem du ausführst
clans.tutorial.core-trust= und ihnen optional vertrauen, indem du ausführst
clans.tutorial.alliance-limit=Du darfst maximal {0} Spieler zwischen {1} und {2} {3} haben. Siehe
clans.tutorial.alliance-help= für weitere Informationen zu Clan-Befehlen.
clans.tutorial.map-intro=Es gibt einige verschiedene Bereiche in der Welt zu erkunden. Verwende
clans.tutorial.map-info= um die Karte zu sehen und dich zurechtzufinden. Karten zeigen deine Clanmitglieder. Während einer Plünderung zeigen sie auch Feinde.
clans.tutorial.shops=In jeder Himmelsrichtung gibt es einen {0}, der {1} enthält. Hier kannst du die meisten Gegenstände verkaufen, wichtige Waren kaufen, Kerker betreten und deine Klasse wechseln.\nDu kannst von dem Weltspawn aus hierher teleportieren.
clans.tutorial.fields=In der Mitte der Karte befindet sich {0}. Ein stark frequentiertes Gebiet, wo du Erze finden, Fischen und einen Teleporter zu Events nutzen kannst.
clans.tutorial.events=Regelmäßig finden Events statt, die du über das Portal in {0} erreichen kannst. Diese Events können {1} fallen lassen. Das sind starke, besondere Waffen mit einzigartigen Fähigkeiten. Hier kannst du auch Runen und Kerker-Tokens finden.
clans.tutorial.classes=Derzeit gibt es {0} {1} {2}, eine für jedes Rüstungsset. Jede hat ihre Stärken und Schwächen. Es gibt viele verschiedene {3} zur Auswahl, wähle diejenigen, die am besten zu deinem Spielstil passen. Du kannst {4} für jede {5} an einem Enchanting-Tisch anpassen.
clans.tutorial.custom-items=Es gibt benutzerdefinierte Gegenstände, die du finden, kaufen oder herstellen kannst. Du kannst die herstellbaren Gegenstände und ihre Rezepte einsehen, indem du ausführst
clans.tutorial.custom-items-info=. Diese Gegenstände können dir im Kampf einen Vorteil verschaffen oder dir beim Sammeln von Ressourcen helfen.
clans.tutorial.custom-items-rare=Einige dieser Gegenstände sind nur bei Events, in Kerkern oder bei Überfällen erhältlich, also halte Ausschau.
clans.tutorial.reinforced=Klassen/Kits werden durch Rüstung identifiziert, du hast automatisch eine Klasse. Du kannst das spezifische Rüstungsset craften, um das verstärkte Set zu erhalten. Du darfst nur das verstärkte Set deiner Klasse tragen. Verstärkte Teile geben erhöhte Gesundheit.
clans.tutorial.upgraded-weapons=Deine Basiswaffen können aufgewertet werden. {0} (aus Goldblöcken hergestellt) oder {1} (aus Diamantblöcken hergestellt). {2} erhöht den relevanten {3} um {4} und {5} erhöht den Schaden um {6}. {7} Waffen (bei Events gefunden) kombinieren die Effekte von beiden!
clans.tutorial.progression=Es gibt mehr als nur Kampf, du kannst auch andere Bereiche aufleveln. Steigere deinen Fortschritt in {0}, {1} und {2}
clans.tutorial.fishing-title=Angeln
clans.tutorial.fishing=Nimm deine Angel und wirf sie in {0}, angle nach Fischen und Schätzen. Steige mit Fängen auf, wirf Köder aus, um Fische anzulocken, und verbessere deine Angel für schwerere Fische. Verkaufe deinen Fang in Läden oder bringe deinen Schatz nach Hause.
clans.tutorial.mining-title=Bergbau
clans.tutorial.mining=Nimm deine Spitzhacke und begib dich in die Minen, denn dort warten Reichtümer. Verdiene Erfahrung, mit 5x mehr in {0}. Höhere Level führen zu mehr Drops und schnelleren Abbaugeschwindigkeiten.
clans.tutorial.woodcutting-title=Holzfällen
clans.tutorial.woodcutting=Nimm deine Axt und suche einen Baum zum Fällen. Steige mit jedem gefällten Block auf und erhalte Zugang zu neuen Vorteilen und Fähigkeiten.
clans.tutorial.good-luck=Viel Glück bei deinen Abenteuern und vergiss nicht, Spaß zu haben.

