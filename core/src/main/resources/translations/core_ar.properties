## Champions roles (class display names)
core.role.assassin.name=المُغتال
core.role.knight.name=الفارس
core.role.brute.name=العملاق
core.role.ranger.name=الرامي
core.role.mage.name=الساحر
core.role.warlock.name=الشرير الساحر
core.role.assassin.description=المُغتال فئة سريعة ورشيقة. مع صحة منخفضة نسبياً وضعف أمام بعض الفئات، ليس من السهل الوقوع في مواجهة مباشرة. الأنسب لمهاجمة الأعداء المشتتين أو المشغولين، وسيعاني ضد الأعداء المستعدين.
core.role.knight.description=الفارس فئة قوية وعدوانية. يزدهر في الهجوم، ولديه خيارات لزيادة الضرر، إلى جانب قدرات تبقيه حياً طويلاً بما يكفي لقتل خصمه.
core.role.brute.description=العملاق قوة جبارة نادراً ما يتزعزع. لديه تحكم جيد في الحشود وقدرات دفاعية.
core.role.ranger.description=الرامي فئة من بعد بارعة في استخدام القوس. هناك خيارات متعددة تكافئ الدقة والصبر أو الإصابة من مسافات بعيدة.
core.role.mage.description=الساحر فئة بارعة في العناصر المختلفة. اختر بين الحياة والجليد والنار والأرض لدعم زملائك وإيقاع العدو وقتله.
core.role.warlock.description=الشرير الساحر فئة تتمحور حول الصحة. بعض القدرات تتطلب التضحية بالصحة، وأخرى تعاقب الأعداء على القرب والصحة المنخفضة.

