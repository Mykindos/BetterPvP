clans.tutorial.map-intro=W świecie jest kilka różnych obszarów do eksploracji. Użyj
clans.tutorial.map-info= aby zobaczyć mapę i znaleźć drogę. Mapy pokazują twoich klanowych. Podczas plądrowania pokazują też wrogów.
clans.tutorial.shops=W każdym kierunku kardynalnym jest {0} zawierający {1}. Tutaj możesz sprzedawać większość przedmiotów, kupować podstawowe towary, dostęp do lochów i zmieniać klasę.\nMożesz tu teleportować się ze spawnu świata.
clans.tutorial.fields=W centrum mapy jest {0}. Obszar o dużym ruchu, gdzie możesz znaleźć rudy, miejsca do wędkowania i teleporter do wydarzeń.
clans.tutorial.events=Okresowo odbywają się wydarzenia, dostępne przez portal w {0}. Te wydarzenia mogą upuścić {1}. To potężna, specjalna broń z unikalnymi możliwościami. Możesz tu też znaleźć runy i tokeny lochów.
clans.tutorial.classes=Obecnie istnieje {0} {1} {2}, jedna dla każdego zestawu zbroi. Każda ma swoje mocne i słabe strony. Jest wiele różnych {3} do wyboru, wybierz te, które najbardziej pasują do twojego stylu gry. Możesz dostosować {4} dla dowolnej {5} przy stole zaklinania.
clans.tutorial.custom-items=Istnieją niestandardowe przedmioty, które możesz znaleźć, kupić lub zrobić. Możesz zobaczyć craftowalne przedmioty i ich przepisy, wykonując
clans.tutorial.custom-items-info=. Te przedmioty mogą dać ci przewagę w walce lub pomóc w zbieraniu zasobów.
clans.tutorial.custom-items-rare=Niektóre z tych przedmiotów są dostępne tylko z wydarzeń, lochów lub rajdów, więc miej oczy otwarte.
clans.tutorial.reinforced=Klasy/Kity są identyfikowane przez zbroję, automatycznie masz klasę. Możesz zrobić konkretny zestaw zbroi, aby uzyskać wzmocniony zestaw. Możesz nosić tylko wzmocniony zestaw swojej klasy. Wzmocnione części dają zwiększone zdrowie.
clans.tutorial.upgraded-weapons=Twoja podstawowa broń może być ulepszona. {0} (zrobione ze złotych bloków) lub {1} (zrobione z diamentowych bloków). {2} zwiększa odpowiednie {3} o {4}, a {5} zwiększa obrażenia o {6}. Bronie {7} (znalezione na wydarzeniach) łączą efekty obu!
clans.tutorial.progression=Jest więcej niż tylko walka, możesz też awansować w innych dziedzinach. Podnoś swój poziom w {0}, {1} i {2}
clans.tutorial.fishing-title=Wędkowanie
clans.tutorial.fishing=Weź wędkę i rzuć ją w {0}, łowiąc ryby i skarby. Zdobywaj poziomy z połowów, rzucaj przynęty, aby zwabić ryby, i ulepszaj wędkę, aby łowić cięższe ryby. Sprzedaj swój połów w sklepach lub zabierz skarb do domu.
clans.tutorial.mining-title=Górnictwo
clans.tutorial.mining=Weź kilof i udaj się do kopalni, bo czekają tam bogactwa. Zdobywaj doświadczenie, z 5x więcej w {0}. Wyższe poziomy prowadzą do większych łupów i szybszych prędkości wydobycia.
clans.tutorial.woodcutting-title=Drwalstwo
clans.tutorial.woodcutting=Weź siekierę i znajdź drzewo do ścięcia. Zdobywaj poziomy z każdym ściętym kłodą, dając ci dostęp do nowych korzyści i umiejętności.
clans.tutorial.good-luck=Powodzenia w przygodach i pamiętaj, żeby się dobrze bawić.

