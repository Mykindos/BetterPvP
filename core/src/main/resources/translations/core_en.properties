core.role.mage.name=Mage
core.role.warlock.name=Warlock
core.role.assassin.description=Assassin is a quick and agile class. With relatively low health and strong counters, this is not an easy class to be caught out in. Best suited for attacking distracted or otherwise occupied enemies, it will struggle against enemies that are prepared.
core.role.knight.description=Knight is a strong, aggressive class. It thrives being on the attack, having options to increase damage, while also having a few that can keep them alive long enough to kill their opponent.
core.role.brute.description=Brute is a powerhouse that is rarely moved by others. It has good crowd control and defensive abilities.
core.role.ranger.description=Ranger is a ranged class skilled in the use of the bow. There are different options, rewarding precision, patience, or long distance accuracy.
core.role.mage.description=Mage is a class skilled with different elements. Choose between life, ice, fire, and earth to support your teammates, trap the enemy, and kill them.
core.role.warlock.description=Warlock is a class focused on health. Some abilities require the sacrifice in health, others punish enemies for proximity and low health.

