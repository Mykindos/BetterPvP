## Champions roles (class display names)
core.role.assassin.name=アサシン
core.role.knight.name=ナイト
core.role.brute.name=ブルート
core.role.ranger.name=レンジャー
core.role.mage.name=メイジ
core.role.warlock.name=ウォーロック
core.role.assassin.description=アサシンは素早く機敏なクラスです。体力が低く弱点も多いため扱いは難しいですが、気を取られた敵や手が塞がっている敵への奇襲に長けています。準備万端の敵には苦戦します。
core.role.knight.description=ナイトは攻撃的で強力なクラスです。攻撃時に真価を発揮し、ダメージを高める手段を持ちながら、敵を倒すまで生き残るためのスキルも備えています。
core.role.brute.description=ブルートはほとんど動じない強靭なクラスです。優れた群衆制御能力と防御スキルを持っています。
core.role.ranger.description=レンジャーは弓の扱いに長けた遠距離クラスです。精度、忍耐、または遠距離精度を活かす様々な選択肢があります。
core.role.mage.description=メイジは様々な元素を操るクラスです。生命、氷、火、土から選択し、味方を支援したり、敵を罠にはめて倒しましょう。
core.role.warlock.description=ウォーロックは体力を軸としたクラスです。自身の体力を消費するスキルや、近距離の低体力の敵を罰するスキルがあります。

