champions.command.kit.description=Équiper un kit
champions.command.send-skills.description=Envoyer vos compétences en tant que message formaté dans votre canal de discussion
champions.command.skill-description.description=Affiche la description de la compétence dans votre chat
champions.command.skills.description=Voir vos compétences actuelles
champions.command.legends.description=Donner à la cible toutes les armes légendaires et mythiques
champions.command.prompt-build.description=Ouvrir un build prompt (pour les tests)
champions.command.runes.description=Donner à la cible toutes les runes du tier spécifié
champions.command.validate.description=Modifier la validation des statistiques des joueurs
champions.command.reload.description=Recharger le plugin champions
champions.command.champions.description=Commande champions de base
champions.command.combat.description=Voir les statistiques de combat d''un joueur

