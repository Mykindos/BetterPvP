champions.ability.gator-stroke.description=Stuwt de gebruiker voort op hoge snelheid. Deze vaardigheid werkt alleen in water.
champions.ability.hard-slash.name=Harde Houw
champions.ability.hard-slash.description=Richt schade toe aan nabijgelegen vijanden en stoot ze terug met een vurige houw.
champions.ability.heavensplitter.name=Hemelsplijter
champions.ability.heavensplitter.description=Gooi het wapen, roep de kracht van Thor op en richt schade toe aan vijanden op zijn pad.
champions.ability.hyper-rush.name=Hyper Rush
champions.ability.hyper-rush.description=Krijg een uitbarsting van hoge snelheid voor een korte duur.
champions.ability.lifesteal.name=Levensdiefstal
champions.ability.lifesteal.description=Herstel een deel van de schade die je aan een vijand toebrengt via melee-aanvallen.
champions.ability.magnetism.name=Magnetisme
champions.ability.magnetism.description=Spawnt een kegel van deeltjes voor je die entiteiten naar binnen trekt.
champions.ability.regeneration.name=Regeneratie
champions.ability.regeneration.description=Krijg een klein regeneratie-effect voor een korte duur.
champions.ability.shield.name=Schild
champions.ability.shield.description=Krijg een versterkt regeneratie-effect tijdens het gebruik van deze vaardigheid.
champions.ability.magnetic-pull.name=Magnetische aantrekking
champions.ability.magnetic-pull.description=Vijanden die door dit wapen worden geraakt, worden naar binnen getrokken in plaats van weggeduwd.
champions.ability.skyforged-ascent.name=Hemelgesmede Opkomst
champions.ability.skyforged-ascent.description=Gooi het wapen omhoog om de hemel in te stijgen, rijdend op zijn goddelijke kracht en een snelheidsboost te krijgen.
champions.ability.speed-boost.name=Snelheidsboost
champions.ability.speed-boost.description=Krijg een klein snelheidseffect voor een korte duur.
champions.ability.throwing-web.name=Spinnenweb gooien
champions.ability.throwing-web.description=Gooi een web dat bij impact tijdelijk spinnenwebben plaatst. Dit kan worden gebruikt om vijanden te vangen.
champions.ability.tilling-tremor.name=Ploegbeving
champions.ability.tilling-tremor.description=Oogst gewassen in een kleine straal. Vijanden in het gebied worden beschadigd en teruggeslagen.
champions.ability.underwater-breathing.name=Onderwaterademhaling
champions.ability.underwater-breathing.description=Verleent onmiddellijke onderwaterademhaling bij het vasthouden van dit item in water.
champions.ability.vine-snare.name=Rankstrik
champions.ability.vine-snare.description=Bouten laten ranken vrij die vijanden verstrikken en aan de grond verankeren.
champions.ability.voltic-bash.name=Voltische slag
champions.ability.voltic-bash.description=Laad op en storm naar voren, schade toebrengen aan entiteiten op je pad. Een hogere lading verhoogt schade en snelheid.
champions.ability.water-damage.name=Waterschade
champions.ability.water-damage.description=Verhoogt de schade van melee-aanvallen in water met een vast bedrag.
champions.ability.wind-dash.name=Winddash
champions.ability.wind-dash.description=Maak een sprong naar voren. De eerste vijand die je raakt, wordt de lucht in geslingerd.
champions.ability.wind-slash.name=Windslag
champions.ability.wind-slash.description=Schiet 3 windstoten af. Wanneer ze een vijand raken, herstel je wat energie en breng je hem schade toe.
champions.ability.nectar-of-decay.name=Nectar van verval
champions.ability.nectar-of-decay.description=Ontketen een giftige bloesem die uitbarst in een verspreidende gifwolk en gezondheid van vijanden onttrekt om je eigen gezondheid te herstellen.
champions.ability.soul-harvest.name=Zielenoogst
champions.ability.soul-harvest.description=Verzamel zielen van gevallen spelers en mobs om hun zielen te oogsten en schade en snelheid te winnen.
champions.ability.hunters-brand.name=Jagersmerk
champions.ability.hunters-brand.description=Voer 2 opeenvolgende Needlegrasp-resets uit op hetzelfde doelwit om een frenzystaat te activeren. Geeft ook bonusschade aan vergiftigde vijanden.
champions.ability.needlegrasp.name=Needlegrasp
champions.ability.needlegrasp.description=Gooi een rank die jou en een vijand naar elkaar toe trekt. Raak ze met een melee-aanval om je cooldown te resetten.
champions.ability.vipersprint.name=Vipersprint
champions.ability.vipersprint.description=Storm op hoge snelheid naar voren, je pad kromend met je richting terwijl je alles op je weg doorsnijdt. Een vijand raken reset je cooldown.
champions.ability.healing-nova.name=Genezingsnova
champions.ability.healing-nova.description=Lanceert een nova die nabijgelegen bondgenoten geneest voor {0} {1} bij landing.
champions.ability.meridian-beam.name=Meridiaalstraal
champions.ability.meridian-beam.description=Vuurt een vernietigende energiestraal af die in een rechte lijn reist.
champions.ability.equip.name=Uitrusten
champions.ability.equip.description=Wisselt onmiddellijk naar de klasse {0}. Werkt niet in gevecht. Pantser opgeslagen op dit item wordt uitgerust.

