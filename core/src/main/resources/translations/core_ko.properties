## Champions roles (class display names)
core.role.assassin.name=어쌔신
core.role.knight.name=나이트
core.role.brute.name=브루트
core.role.ranger.name=레인저
core.role.mage.name=메이지
core.role.warlock.name=워록
core.role.assassin.description=어쌔신은 빠르고 민첩한 클래스입니다. 체력이 낮고 약점이 뚜렷해 다루기 쉽지 않습니다. 주의가 분산되거나 바쁜 적을 기습하는 데 최적화되어 있으며, 준비된 적을 상대로는 힘겨울 수 있습니다.
core.role.knight.description=나이트는 강력한 공격형 클래스입니다. 공격 중에 진가를 발휘하며 피해를 높이는 수단과 함께, 상대를 처치할 때까지 살아남을 수 있는 스킬도 갖추고 있습니다.
core.role.brute.description=브루트는 쉽게 밀리지 않는 강인한 클래스로, 우수한 군중 제어 및 방어 능력을 갖추고 있습니다.
core.role.ranger.description=레인저는 활 사용에 능숙한 원거리 클래스입니다. 정확성, 인내, 또는 장거리 명중을 보상하는 다양한 선택지가 있습니다.
core.role.mage.description=메이지는 다양한 원소를 다루는 클래스입니다. 생명, 얼음, 불, 땅 중에서 선택하여 아군을 지원하고, 적을 함정에 가두고 처치하세요.
core.role.warlock.description=워록은 체력 중심의 클래스입니다. 자신의 체력을 희생해야 하는 스킬도 있고, 근접한 저체력 적을 처벌하는 스킬도 있습니다.

