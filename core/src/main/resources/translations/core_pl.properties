## Champions roles (class display names)
core.role.assassin.name=Zabójca
core.role.knight.name=Rycerz
core.role.brute.name=Brutal
core.role.ranger.name=Łowca
core.role.mage.name=Mag
core.role.warlock.name=Czarnoksiężnik
core.role.assassin.description=Zabójca to szybka i zwinna klasa. Przy stosunkowo niskim zdrowiu i silnych słabościach, nie jest to łatwa klasa w bezpośrednim starciu. Najlepiej nadaje się do atakowania rozproszonych lub zajętych wrogów; będzie miała trudności z przygotowanymi przeciwnikami.
core.role.knight.description=Rycerz to silna, agresywna klasa. Rozkwita w ataku, mając opcje zwiększania obrażeń, a także kilka zdolności podtrzymujących go przy życiu wystarczająco długo, by zabić przeciwnika.
core.role.brute.description=Brutal to potęga, którą rzadko cokolwiek poruszy. Posiada dobre kontrolowanie tłumu i zdolności defensywne.
core.role.ranger.description=Łowca to klasa dystansowa biegła w używaniu łuku. Dostępne są różne opcje nagradzające precyzję, cierpliwość lub celność na długi dystans.
core.role.mage.description=Mag to klasa biegła w różnych żywiołach. Wybierz spośród życia, lodu, ognia i ziemi, aby wspierać towarzyszy drużyny, pułapkować wrogów i ich zabijać.
core.role.warlock.description=Czarnoksiężnik to klasa skupiona na zdrowiu. Niektóre zdolności wymagają poświęcenia zdrowia, inne karzą wrogów za bliskość i niskie zdrowie.

