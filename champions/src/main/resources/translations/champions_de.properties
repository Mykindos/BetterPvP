champions.ability.replace-armor.description=Ausrüstung auf diesem Gegenstand hinzufügen oder entfernen.
champions.ability.batto-do.name=Batto-Do
champions.ability.batto-do.description=Stürme nach vorne und treffe Ziele auf deinem Weg, verursache Schaden, schlage sie zurück und setze sie in Brand.
champions.ability.black-hole.name=Schwarzes Loch
champions.ability.black-hole.description=Erzeugt ein schwarzes Loch, das nahe Entitäten für kurze Zeit anzieht.
champions.ability.cleanse.name=Reinigung
champions.ability.cleanse.description=Entfernt negative Effekte und gewährt für kurze Zeit Immunität.
champions.ability.dodge.name=Ausweichen
champions.ability.dodge.description=Weiche schnell horizontal aus, um eingehende Angriffe zu vermeiden.
champions.ability.effect-roulette.name=Effekt-Roulette
champions.ability.effect-roulette.description=Gewährt für kurze Zeit einen zufälligen Effekt. Der Effekt kann positiv oder negativ sein.
champions.ability.energy-boost.name=Energieschub
champions.ability.energy-boost.description=Gewährt beim Benutzen sofort einen festen Energieschub.
champions.ability.feather-feet.name=Federfüße
champions.ability.feather-feet.description=Verhindert jeglichen Fallschaden, solange du diesen Gegenstand hältst.
champions.ability.gator-stroke.name=Krokodilsschlag
champions.ability.gator-stroke.description=Treibt den Benutzer mit hoher Geschwindigkeit voran. Diese Fähigkeit funktioniert nur im Wasser.
champions.ability.hard-slash.name=Harter Hieb
champions.ability.hard-slash.description=Füge nahen Feinden Schaden zu und schlage sie mit einem feurigen Hieb zurück.
champions.ability.heavensplitter.name=Himmelsspalter
champions.ability.heavensplitter.description=Wirf die Waffe, beschwöre die Kraft Thors und füge Feinden auf seinem Weg Schaden zu.
champions.ability.hyper-rush.name=Hyper Rush
champions.ability.hyper-rush.description=Erhalte für kurze Zeit einen Schub auf hohe Geschwindigkeit.
champions.ability.lifesteal.name=Lebensraub
champions.ability.lifesteal.description=Heile dich um einen Teil des Schadens, den du einem Feind durch Nahkampfangriffe zufügst.
champions.ability.magnetism.name=Magnetismus
champions.ability.magnetism.description=Erzeugt einen Partikelkegel vor dir, der Entitäten nach innen zieht.
champions.ability.regeneration.name=Regeneration
champions.ability.regeneration.description=Erhalte für kurze Zeit einen kleinen Regenerationseffekt.
champions.ability.shield.name=Schild
champions.ability.shield.description=Erhalte einen verstärkten Regenerationseffekt, während du diese Fähigkeit benutzt.
champions.ability.magnetic-pull.name=Magnetischer Sog
champions.ability.magnetic-pull.description=Feinde, die von dieser Waffe getroffen werden, werden nach innen gezogen anstatt weggeschleudert.
champions.ability.skyforged-ascent.name=Himmelsgeschmiedeter Aufstieg
champions.ability.skyforged-ascent.description=Wirf die Waffe, um in den Himmel aufzusteigen, auf ihrer göttlichen Kraft reitend und einen Geschwindigkeitsschub erhaltend.
champions.ability.speed-boost.name=Geschwindigkeitsschub
champions.ability.speed-boost.description=Erhalte für kurze Zeit einen kleinen Geschwindigkeitseffekt.
champions.ability.throwing-web.name=Netz werfen
champions.ability.throwing-web.description=Wirf ein Netz, das beim Aufprall vorübergehend Spinnweben platziert. Dies kann verwendet werden, um Feinde zu fangen.
champions.ability.tilling-tremor.name=Pflugbeben
champions.ability.tilling-tremor.description=Ernte Pflanzen in einem kleinen Radius. Feinde im Bereich werden beschädigt und zurückgeschleudert.
champions.ability.underwater-breathing.name=Unterwasseratmung
champions.ability.underwater-breathing.description=Gewährt sofortige Unterwasseratmung, wenn dieses Item im Wasser gehalten wird.
champions.ability.vine-snare.name=Rankenfalle
champions.ability.vine-snare.description=Bolzen setzen Ranken frei, die Feinde fesseln und am Boden verankern.
champions.ability.voltic-bash.name=Voltischer Schlag
champions.ability.voltic-bash.description=Lade auf und stürme vorwärts, Entitäten auf deinem Weg Schaden zufügend. Höhere Ladung erhöht Schaden und Geschwindigkeit.
champions.ability.water-damage.name=Wasserschaden
champions.ability.water-damage.description=Erhöht den Schaden von Nahkampfangriffen im Wasser um einen festen Betrag.
champions.ability.wind-dash.name=Windsprint
champions.ability.wind-dash.description=Mache einen Sprung nach vorne. Der erste getroffene Feind wird in die Luft geschleudert.
champions.ability.wind-slash.name=Windschlag
champions.ability.wind-slash.description=Schieße 3 Windstöße ab. Wenn sie einen Feind treffen, stelle etwas Energie wieder her und füge ihm Schaden zu.
champions.ability.nectar-of-decay.name=Nektar des Verfalls
champions.ability.nectar-of-decay.description=Entfessle eine giftige Blüte, die in eine sich ausbreitende Giftwolke explodiert und Gesundheit von Feinden absaugt, um deine eigene zu heilen.
champions.ability.soul-harvest.name=Seelenernte
champions.ability.soul-harvest.description=Sammle Seelen gefallener Spieler und Mobs, um ihre Seelen zu ernten und Schaden sowie Geschwindigkeit zu gewinnen.
champions.ability.hunters-brand.name=Jägermarke
champions.ability.hunters-brand.description=Führe 2 aufeinanderfolgende Needlegrasp-Resets auf dasselbe Ziel aus, um einen Raserei-Zustand auszulösen. Verursacht außerdem Bonusschaden an vergifteten Feinden.
champions.ability.needlegrasp.name=Needlegrasp
champions.ability.needlegrasp.description=Wirf eine Ranke, die dich und einen Feind zueinander zieht. Triff ihn mit einem Nahkampfangriff, um deinen Cooldown zurückzusetzen.
champions.ability.vipersprint.name=Vipersprint
champions.ability.vipersprint.description=Stürme mit hoher Geschwindigkeit vorwärts, deinen Weg mit deinem Ziel krümmend, während du alles auf deinem Weg durchschneidest. Einen Feind zu treffen setzt deinen Cooldown zurück.
champions.ability.healing-nova.name=Heilungsnova
champions.ability.healing-nova.description=Schießt eine Nova ab, die nahegelegene Verbündete um {0} {1} heilt, wenn sie landet.
champions.ability.meridian-beam.name=Meridianstrahl
champions.ability.meridian-beam.description=Feuert einen vernichtenden Energiestrahl ab, der sich in einer geraden Linie bewegt.
champions.ability.equip.name=Ausrüsten
champions.ability.equip.description=Wechselt sofort zur Klasse {0}. Funktioniert nicht im Kampf. Auf diesem Item gespeicherte Rüstung wird ausgerüstet.

