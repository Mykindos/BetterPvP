# Ability display (interaction lore)
champions.ability.replace-armor.name=Zastąp zbroję
champions.ability.replace-armor.description=Dodaj lub usuń ekwipunek przechowywany na tym przedmiocie.
champions.ability.batto-do.name=Batto-Do
champions.ability.batto-do.description=Rzuć się do przodu i uderzaj cele na swojej ścieżce, zadając obrażenia, odrzucając je i podpalając.
champions.ability.black-hole.name=Czarna dziura
champions.ability.black-hole.description=Tworzy czarną dziurę przyciągającą pobliskie istoty przez krótki czas.
champions.ability.cleanse.name=Oczyszczenie
champions.ability.cleanse.description=Usuwa negatywne efekty i zapewnia odporność na krótki czas.
champions.ability.dodge.name=Unik
champions.ability.dodge.description=Szybko wykonaj poziomy unik, aby uniknąć nadchodzących ataków.
champions.ability.effect-roulette.name=Ruletka efektów
champions.ability.effect-roulette.description=Przyznaje losowy efekt na krótki czas. Efekt może być pozytywny lub negatywny.
champions.ability.energy-boost.name=Zastrzyk energii
champions.ability.energy-boost.description=Natychmiast przyznaje stały zastrzyk energii podczas użycia.
champions.ability.feather-feet.name=Piórkowe stopy
champions.ability.feather-feet.description=Zapobiega wszelkim obrażeniom od upadku podczas trzymania tego przedmiotu.
champions.ability.gator-stroke.name=Aligatorowe uderzenie
champions.ability.gator-stroke.description=Pędzi użytkownikiem z dużą prędkością. Ta zdolność działa tylko w wodzie.
champions.ability.hard-slash.name=Mocne cięcie
champions.ability.hard-slash.description=Zadaj obrażenia pobliskim wrogom i odrzuć ich ognistym cięciem.
champions.ability.heavensplitter.name=Rozłupywacz nieba
champions.ability.heavensplitter.description=Rzuć bronią, przywołaj moc Thora i zadaj obrażenia wrogom na jej drodze.
champions.ability.hyper-rush.name=Hyper Rush
champions.ability.hyper-rush.description=Zyskaj na krótki czas wybuch wysokiej prędkości.
champions.ability.lifesteal.name=Kradzież życia
champions.ability.lifesteal.description=Lecz się o część obrażeń zadanych wrogowi atakami wręcz.
champions.ability.magnetism.name=Magnetyzm
champions.ability.magnetism.description=Tworzy stożek cząstek przed tobą, który przyciąga istoty do wewnątrz.
champions.ability.regeneration.name=Regeneracja
champions.ability.regeneration.description=Zyskaj niewielki efekt regeneracji na krótki czas.
champions.ability.shield.name=Tarcza
champions.ability.shield.description=Zyskaj wzmocniony efekt regeneracji podczas używania tej zdolności.
champions.ability.magnetic-pull.name=Magnetyczne przyciąganie
champions.ability.magnetic-pull.description=Wrogowie trafieni tą bronią są przyciągani do wewnątrz zamiast być odpychani.
champions.ability.skyforged-ascent.name=Niebiańskie wzniesienie
champions.ability.skyforged-ascent.description=Rzuć bronią, aby wzbić się ku niebu, jadąc na jej boskiej sile i zyskując przypływ prędkości.
champions.ability.speed-boost.name=Przyspieszenie
champions.ability.speed-boost.description=Uzyskaj mały efekt prędkości na krótki czas.
champions.ability.throwing-web.name=Rzucanie siecią
champions.ability.throwing-web.description=Rzuć siecią, która tymczasowo umieszcza pajęczyny przy uderzeniu. Może służyć do łapania wrogów.
champions.ability.tilling-tremor.name=Drżenie orki
champions.ability.tilling-tremor.description=Zbieraj plony w małym promieniu. Wrogowie w obszarze zostaną ranni i odrzuceni.
champions.ability.underwater-breathing.name=Oddychanie pod wodą
champions.ability.underwater-breathing.description=Zapewnia natychmiastowe oddychanie pod wodą podczas trzymania tego przedmiotu w wodzie.
champions.ability.vine-snare.name=Pułapka z winorośli
champions.ability.vine-snare.description=Pociski uwalniają winorośle, które unieruchamiają wrogów i kotwiczą ich do ziemi.
champions.ability.voltic-bash.name=Uderzenie voltyczne
champions.ability.voltic-bash.description=Naładuj się i rzuć do przodu, zadając obrażenia bytom na twojej drodze. Wyższe naładowanie zwiększa obrażenia i prędkość.
champions.ability.water-damage.name=Obrażenia wodne
champions.ability.water-damage.description=Zwiększa obrażenia zadawane przez ataki w zwarciu w wodzie o stałą wartość.
champions.ability.wind-dash.name=Wietrzny zryw
champions.ability.wind-dash.description=Wykonaj skok do przodu. Pierwszy wróg, którego trafisz, zostanie wyrzucony w powietrze.
champions.ability.wind-slash.name=Cięcie wiatrem
champions.ability.wind-slash.description=Wystrzel 3 podmuchy wiatru. Gdy trafią wroga, odzyskaj trochę energii i zadaj mu obrażenia.
champions.ability.nectar-of-decay.name=Nektar rozkładu
champions.ability.nectar-of-decay.description=Uwolnij toksyczny kwiat, który wybucha w rozszerzającą się chmurę trucizny, wysysając zdrowie wrogów, aby przywrócić swoje własne.
champions.ability.soul-harvest.name=Żniwa dusz
champions.ability.soul-harvest.description=Zbieraj dusze poległych graczy i mobów, aby zebrać ich dusze, zyskując obrażenia i prędkość.
champions.ability.hunters-brand.name=Znamię łowcy
champions.ability.hunters-brand.description=Wykonaj 2 kolejne resety Needlegrasp na tym samym celu, aby wywołać stan szału. Zadaje również dodatkowe obrażenia zatrutym wrogom.
champions.ability.needlegrasp.name=Needlegrasp
champions.ability.needlegrasp.description=Rzuć winoroślą, która przyciągnie ciebie i wroga ku sobie. Uderz go atakiem w zwarciu, aby zresetować czas odnowienia.
champions.ability.vipersprint.name=Vipersprint
champions.ability.vipersprint.description=Rzuć się do przodu z dużą prędkością, zakrzywiając ścieżkę celowaniem, przecinając wszystko na swojej drodze. Trafienie wroga resetuje czas odnowienia.
champions.ability.healing-nova.name=Nova leczenia
champions.ability.healing-nova.description=Wystrzeliwuje novę, która leczy pobliskich sojuszników o {0} {1} przy lądowaniu.
champions.ability.meridian-beam.name=Promień południkowy
champions.ability.meridian-beam.description=Wystrzeliwuje niszczycielski promień energii poruszający się w linii prostej.
champions.ability.equip.name=Załóż
champions.ability.equip.description=Natychmiast przełącza na klasę {0}. Nie działa w walce. Zbroja przechowywana na tym przedmiocie zostanie założona.

