core.role.mage.name=Magiër
core.role.warlock.name=Heksmeester
core.role.assassin.description=De Assassin is een snelle en wendbare klasse. Met relatief weinig gezondheid en sterke zwaktes is dit geen gemakkelijke klasse in een eerlijk gevecht. Het meest geschikt voor het aanvallen van afgeleid of bezette vijanden; zal moeite hebben tegen voorbereide vijanden.
core.role.knight.description=De Ridder is een sterke, agressieve klasse. Hij gedijt in de aanval, heeft opties om schade te verhogen, en heeft ook enkele capaciteiten die hem lang genoeg in leven houden om zijn tegenstander te doden.
core.role.brute.description=De Brute is een krachtpatser die zelden wordt bewogen. Hij heeft goede menigtebeheer en defensieve vaardigheden.
core.role.ranger.description=De Ranger is een klasse op afstand, bedreven in het gebruik van de boog. Er zijn verschillende opties die precisie, geduld of accuratesse op lange afstand belonen.
core.role.mage.description=De Magiër is een klasse die bedreven is met verschillende elementen. Kies tussen leven, ijs, vuur en aarde om je teamgenoten te ondersteunen, de vijand te vangen en te doden.
core.role.warlock.description=De Heksmeester is een klasse gericht op gezondheid. Sommige vaardigheden vereisen het opofferen van gezondheid, andere bestraffen vijanden vanwege nabijheid en lage gezondheid.

