clans.tutorial.alliance-help= untuk maklumat lanjut tentang arahan Klan.
clans.tutorial.map-intro=Terdapat beberapa kawasan berbeza untuk diterokai dalam dunia. Gunakan
clans.tutorial.map-info= untuk melihat peta dan mencari jalan. Peta menunjukkan ahli klan anda. Semasa rampasan, ia juga menunjukkan musuh.
clans.tutorial.shops=Di setiap arah kardinal terdapat {0} yang mengandungi {1}. Di sini, anda boleh menjual kebanyakan item, membeli barangan penting, mengakses dungeon, dan menukar kelas anda.\nAnda boleh teleport ke sini dari spawn dunia.
clans.tutorial.fields=Di tengah peta ialah {0}. Kawasan dengan trafik tinggi, di sini anda boleh mencari bijih, tempat memancing, dan teleporter ke acara.
clans.tutorial.events=Acara akan berlaku secara berkala, yang boleh anda akses menggunakan portal di {0}. Acara ini boleh menjatuhkan {1}. Ini adalah senjata khas yang kuat, diisi dengan keupayaan unik. Anda juga boleh mencari rune dan token dungeon di sini.
clans.tutorial.classes=Terdapat kini {0}{1}{2}, satu untuk setiap set perisai. Setiap satu mempunyai kekuatan dan kelemahannya. Terdapat banyak {3} berbeza untuk dipilih, pilih yang paling sesuai dengan gaya bermain anda. Anda boleh menyesuaikan {4} untuk mana-mana {5} di meja enchanting.
clans.tutorial.custom-items=Terdapat item tersuai yang boleh anda cari, beli, atau kraf. Anda boleh melihat item yang boleh dikraf dan resepinya dengan menjalankan
clans.tutorial.custom-items-info=. Item-item ini boleh digunakan untuk memberi anda kelebihan dalam pertempuran, atau membantu anda mengumpulkan sumber.
clans.tutorial.custom-items-rare=Sesetengah item ini hanya tersedia dari acara, dungeon, atau serangan, jadi berhati-hati.
clans.tutorial.reinforced=Kelas/Kit dikenal pasti mengikut perisai, anda secara automatik mempunyai kelas. Anda boleh mengkraf set perisai tertentu untuk mendapatkan set yang diperkukuh. Anda hanya boleh memakai set diperkukuh kelas anda. Kepingan diperkukuh memberikan kesihatan yang meningkat.
clans.tutorial.upgraded-weapons=Senjata asas anda boleh dinaik taraf. {0} (dibuat dengan blok emas) atau {1} (dibuat dengan blok berlian). {2} meningkatkan {3} yang berkaitan sebanyak {4} dan {5} meningkatkan kerosakan sebanyak {6}. Senjata {7} (dijumpai dari acara) menggabungkan kesan kedua-duanya!
clans.tutorial.progression=Ada lebih daripada sekadar pertempuran, anda juga boleh meningkatkan bidang lain. Naik taraf Perkembangan anda dalam {0}, {1}, dan {2}
clans.tutorial.fishing-title=Memancing
clans.tutorial.fishing=Ambil rod anda dan campakkan ke {0}, memancing ikan dan harta karun. Naik taraf dengan tangkapan, lempar umpan untuk menarik ikan, dan naik taraf rod anda untuk menangkap ikan yang lebih berat. Bawa tangkapan anda ke kedai, atau bawa harta karun pulang.
clans.tutorial.mining-title=Perlombongan
clans.tutorial.mining=Ambil cangkul anda dan pergi ke lombong, kerana ada kekayaan yang menanti. Dapatkan pengalaman, dengan 5x lebih banyak di {0}. Tahap yang lebih tinggi membawa kepada lebih banyak jatuhan dan kelajuan perlombongan yang lebih cepat.
clans.tutorial.woodcutting-title=Menebang Kayu
clans.tutorial.woodcutting=Ambil kapak anda dan cari pokok untuk ditebang. Naik taraf dengan setiap batang kayu yang anda tebang, memberikan anda akses kepada kebolehan dan kemahiran baru.
clans.tutorial.good-luck=Semoga berjaya dalam pengembaraan anda dan ingat untuk berseronok.

