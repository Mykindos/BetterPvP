champions.ability.replace-armor.name=Reemplazar Armadura
champions.ability.replace-armor.description=Agrega o quita el equipo almacenado en este objeto.
champions.ability.batto-do.name=Batto-Do
champions.ability.batto-do.description=Avanza rápidamente y golpea a los objetivos en tu camino, infligiendo daño, empujándolos y prendiéndolos fuego.
champions.ability.black-hole.name=Agujero Negro
champions.ability.black-hole.description=Crea un agujero negro que atrae a las entidades cercanas durante un breve período de tiempo.
champions.ability.cleanse.name=Purificación
champions.ability.cleanse.description=Purifica los efectos negativos y otorga inmunidad durante una breve duración.
champions.ability.dodge.name=Esquivar
champions.ability.dodge.description=Avanza rápidamente en horizontal para esquivar los ataques entrantes.
champions.ability.effect-roulette.name=Ruleta de Efectos
champions.ability.effect-roulette.description=Otorga un efecto aleatorio durante una breve duración. El efecto puede ser positivo o negativo.
champions.ability.energy-boost.name=Impulso de Energía
champions.ability.energy-boost.description=Otorga al instante un impulso fijo de energía al usarse.
champions.ability.feather-feet.name=Pies de Pluma
champions.ability.feather-feet.description=Previene todo el daño por caída mientras sostienes este objeto.
champions.ability.gator-stroke.name=Brazada de Caimán
champions.ability.gator-stroke.description=Impulsa al usuario a gran velocidad. Esta habilidad solo funciona en el agua.
champions.ability.hard-slash.name=Tajo Fuerte
champions.ability.hard-slash.description=Inflige daño a los enemigos cercanos y los empuja con un tajo ardiente.
champions.ability.heavensplitter.name=Hiende Cielos
champions.ability.heavensplitter.description=Lanza el arma, invoca el poder de Thor e inflige daño a los enemigos en su camino.
champions.ability.hyper-rush.name=Hiper Embestida
champions.ability.hyper-rush.description=Obtén una ráfaga de velocidad a un nivel alto durante una breve duración.
champions.ability.lifesteal.name=Robo de Vida
champions.ability.lifesteal.description=Cúrate una porción del daño infligido a un enemigo con ataques cuerpo a cuerpo.
champions.ability.magnetism.name=Magnetismo
champions.ability.magnetism.description=Genera un cono de partículas frente a ti que atrae a las entidades hacia adentro.
champions.ability.regeneration.name=Regeneración
champions.ability.regeneration.description=Obtén un pequeño efecto de regeneración durante una breve duración.
champions.ability.shield.name=Escudo
champions.ability.shield.description=Obtén un efecto de regeneración amplificado mientras usas esta habilidad.
champions.ability.magnetic-pull.name=Atracción Magnética
champions.ability.magnetic-pull.description=Los enemigos golpeados por esta arma serán atraídos hacia adentro en lugar de ser empujados.
champions.ability.skyforged-ascent.name=Ascenso Forjado en el Cielo
champions.ability.skyforged-ascent.description=Lanza el arma para ascender al cielo, montando su fuerza divina, otorgándote una ráfaga de velocidad.
champions.ability.speed-boost.name=Impulso de Velocidad
champions.ability.speed-boost.description=Obtén un pequeño efecto de velocidad durante una breve duración.
champions.ability.throwing-web.name=Telaraña Arrojadiza
champions.ability.throwing-web.description=Lanza una telaraña que coloca temporalmente telarañas al impactar. Esto puede usarse para atrapar enemigos.
champions.ability.tilling-tremor.name=Temblor de Labranza
champions.ability.tilling-tremor.description=Cosecha cultivos en un radio pequeño. Los enemigos en el área recibirán daño y serán empujados.
champions.ability.underwater-breathing.name=Respiración Submarina
champions.ability.underwater-breathing.description=Otorga respiración submarina instantánea al sostener este objeto en el agua.
champions.ability.vine-snare.name=Trampa de Lianas
champions.ability.vine-snare.description=Las flechas liberan lianas que atrapan a los enemigos y los anclan al suelo.
champions.ability.voltic-bash.name=Embate Voltaico
champions.ability.voltic-bash.description=Carga y avanza rápidamente, infligiendo daño a las entidades en tu camino. Una carga mayor aumenta el daño y la velocidad.
champions.ability.water-damage.name=Daño Acuático
champions.ability.water-damage.description=Aumenta el daño infligido por los ataques cuerpo a cuerpo mientras estás en el agua en una cantidad fija.
champions.ability.wind-dash.name=Avance del Viento
champions.ability.wind-dash.description=Da un salto hacia adelante. El primer enemigo que golpees será lanzado al aire.
champions.ability.wind-slash.name=Tajo del Viento
champions.ability.wind-slash.description=Dispara 3 ráfagas de viento. Cuando aterrizan sobre un enemigo, recuperas algo de energía y le infliges daño.
champions.ability.nectar-of-decay.name=Néctar de Decadencia
champions.ability.nectar-of-decay.description=Desata una flor tóxica que estalla en una nube de veneno que se expande, drenando la salud de los enemigos para restaurar la tuya.
champions.ability.soul-harvest.name=Cosecha de Almas
champions.ability.soul-harvest.description=Recolecta las almas de jugadores y criaturas caídos para cosechar sus almas, ganando daño y velocidad.
champions.ability.hunters-brand.name=Marca del Cazador
champions.ability.hunters-brand.description=Logra 2 reinicios consecutivos de Agarre de Espinas sobre el mismo objetivo para activar un estado de frenesí. También inflige daño adicional a los enemigos envenenados.
champions.ability.needlegrasp.name=Agarre de Espinas
champions.ability.needlegrasp.description=Lanza una liana que los atrae a ti y a un enemigo el uno hacia el otro. Golpéalo con un ataque cuerpo a cuerpo para reiniciar tu enfriamiento.
champions.ability.vipersprint.name=Carrera de Víbora
