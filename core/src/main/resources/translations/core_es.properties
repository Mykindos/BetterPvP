## Champions roles (class display names)
core.role.assassin.name=Asesino
core.role.knight.name=Caballero
core.role.brute.name=Bruto
core.role.ranger.name=Explorador
core.role.mage.name=Mago
core.role.warlock.name=Brujo
core.role.assassin.description=El Asesino es una clase rápida y ágil. Con una salud relativamente baja y contraataques potentes, no es una clase fácil de sorprender. Ideal para atacar a enemigos distraídos u ocupados, tendrá dificultades contra enemigos que estén preparados.
core.role.knight.description=El Caballero es una clase fuerte y agresiva. Prospera atacando, con opciones para aumentar el daño y también algunas que lo mantienen vivo el tiempo suficiente para matar a su oponente.
core.role.brute.description=El Bruto es una potencia que rara vez se ve afectado por los demás. Tiene buen control de masas y habilidades defensivas.
core.role.ranger.description=El Explorador es una clase a distancia hábil en el uso del arco. Hay diferentes opciones que recompensan la precisión, la paciencia o la puntería a larga distancia.
core.role.mage.description=El Mago es una clase hábil con diferentes elementos. Elige entre vida, hielo, fuego y tierra para apoyar a tus compañeros, atrapar al enemigo y matarlo.
core.role.warlock.description=El Brujo es una clase centrada en la salud. Algunas habilidades requieren sacrificar salud, otras castigan a los enemigos por su proximidad y baja salud.

