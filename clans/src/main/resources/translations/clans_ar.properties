clans.tutorial.difficulty=قد يكون {0} لعبة صعبة، من الممكن أن تخسر كل شيء وتبدأ من الصفر. هذا ليس شائعاً، لكن يمكن أن يحدث. {1} تُعاد بشكل دوري، ويبدأ الجميع من الصفر.
