# Ability display (interaction lore)
champions.ability.replace-armor.name=更换护甲
champions.ability.replace-armor.description=添加或移除存储在此物品上的装备。
champions.ability.batto-do.name=拔刀斩
champions.ability.batto-do.description=向前冲刺并攻击路径中的目标，造成伤害、击退并点燃他们。
champions.ability.black-hole.name=黑洞
champions.ability.black-hole.description=创建一个黑洞，在短时间内吸引附近的实体。
champions.ability.cleanse.name=净化
champions.ability.cleanse.description=清除负面效果并在短时间内授予免疫。
champions.ability.dodge.name=闪避
champions.ability.dodge.description=快速横向冲刺以躲避来袭的攻击。
champions.ability.effect-roulette.name=效果轮盘
champions.ability.effect-roulette.description=在短时间内授予随机效果，可能是正面或负面效果。
champions.ability.energy-boost.name=能量提升
champions.ability.energy-boost.description=使用时立即提供固定的能量提升。
champions.ability.feather-feet.name=羽毛之足
champions.ability.feather-feet.description=手持此物品时防止所有坠落伤害。
champions.ability.gator-stroke.name=鳄鱼划水
champions.ability.gator-stroke.description=以高速推进使用者，此技能仅在水中有效。
champions.ability.hard-slash.name=重斩
champions.ability.hard-slash.description=对附近的敌人造成伤害并以火焰斩击将其击退。
champions.ability.heavensplitter.name=裂天斩
champions.ability.heavensplitter.description=投掷武器，召唤雷神之力，对路径上的敌人造成伤害。
champions.ability.hyper-rush.name=极速冲刺
champions.ability.hyper-rush.description=在短时间内获得高级速度爆发。
champions.ability.lifesteal.name=生命偷取
champions.ability.lifesteal.description=通过近战攻击对敌人造成伤害时回复一部分生命值。
champions.ability.magnetism.name=磁力
champions.ability.magnetism.description=在你前方生成一个粒子锥，将实体向内吸引。
champions.ability.regeneration.name=再生
champions.ability.regeneration.description=在短时间内获得少量再生效果。
champions.ability.shield.name=盾牌
champions.ability.shield.description=使用此技能时获得增强的再生效果。
champions.ability.magnetic-pull.name=磁力牵引
champions.ability.magnetic-pull.description=被此武器击中的敌人将被向内拉近而非击退。
champions.ability.skyforged-ascent.name=天锻飞升
champions.ability.skyforged-ascent.description=将武器投出以飞升天空，驾驭其神圣之力，获得一阵速度加成。
champions.ability.speed-boost.name=速度加成
champions.ability.speed-boost.description=短时间内获得小幅速度效果。
champions.ability.throwing-web.name=投掷蜘蛛网
champions.ability.throwing-web.description=投出一张网，命中时临时放置蜘蛛网。可用于困住敌人。
champions.ability.tilling-tremor.name=耕地震颤
champions.ability.tilling-tremor.description=在小范围内收割作物。区域内的敌人将受到伤害并被击退。
champions.ability.underwater-breathing.name=水下呼吸
champions.ability.underwater-breathing.description=在水中持有此物品时，立即获得水下呼吸效果。
champions.ability.vine-snare.name=藤蔓陷阱
champions.ability.vine-snare.description=弩箭释放藤蔓，缠绕敌人并将其锚定在地面上。
champions.ability.voltic-bash.name=雷霆冲撞
champions.ability.voltic-bash.description=蓄力后向前冲刺，对路径上的实体造成伤害。蓄力越高，伤害和速度越大。
champions.ability.water-damage.name=水中伤害
champions.ability.water-damage.description=在水中时，近战攻击造成的伤害固定增加。
champions.ability.wind-dash.name=风之冲刺
champions.ability.wind-dash.description=向前跃进。命中的第一个敌人将被击飞。
champions.ability.wind-slash.name=风之斩击
champions.ability.wind-slash.description=射出3道风刃。命中敌人时恢复部分能量并造成伤害。
champions.ability.nectar-of-decay.name=腐化花蜜
champions.ability.nectar-of-decay.description=释放一朵毒花，爆发成扩散的毒云，从敌人身上吸取生命值以恢复自身。
champions.ability.soul-harvest.name=灵魂收割
champions.ability.soul-harvest.description=收集倒下的玩家和生物的灵魂，获得伤害和速度加成。
champions.ability.hunters-brand.name=猎人印记
champions.ability.hunters-brand.description=对同一目标连续命中2次针爪重置以触发狂怒状态。对中毒敌人造成额外伤害。
champions.ability.needlegrasp.name=针爪
champions.ability.needlegrasp.description=投出藤蔓，将自身和敌人拉向彼此。用近战攻击命中敌人以重置冷却时间。
champions.ability.vipersprint.name=蝰蛇冲刺
champions.ability.vipersprint.description=高速向前冲刺，以瞄准方向弯曲路径并穿透路上的一切。命中敌人时重置冷却时间。
champions.ability.healing-nova.name=治愈新星
champions.ability.healing-nova.description=发射一道新星，落地时为附近盟友恢复{0}{1}。
champions.ability.meridian-beam.name=经脉光束
champions.ability.meridian-beam.description=发射一道沿直线传播的伤害能量光束。
champions.ability.equip.name=装备
champions.ability.equip.description=立即切换至{0}职业。战斗中无效。存储在此物品上的护甲将被装备。

