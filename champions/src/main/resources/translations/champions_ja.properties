# Ability display (interaction lore)
champions.ability.replace-armor.name=防具交換
champions.ability.replace-armor.description=このアイテムに保存された装備を追加または取り外します。
champions.ability.batto-do.name=抜刀道
champions.ability.batto-do.description=前方にダッシュして経路上の標的を攻撃し、ダメージを与えて吹き飛ばし、炎上させる。
champions.ability.black-hole.name=ブラックホール
champions.ability.black-hole.description=短時間、周囲のエンティティを引き寄せるブラックホールを生成します。
champions.ability.cleanse.name=クレンズ
champions.ability.cleanse.description=デバフを除去し、短時間免疫を付与します。
champions.ability.dodge.name=ドッジ
champions.ability.dodge.description=横方向に素早くダッシュして攻撃を回避します。
champions.ability.effect-roulette.name=エフェクトルーレット
champions.ability.effect-roulette.description=短時間ランダムな効果を付与します。効果はポジティブまたはネガティブです。
champions.ability.energy-boost.name=エネルギーブースト
champions.ability.energy-boost.description=使用時に即座に一定量のエネルギーを付与します。
champions.ability.feather-feet.name=フェザーフィート
champions.ability.feather-feet.description=このアイテムを持っている間、落下ダメージを完全に防ぎます。
champions.ability.gator-stroke.name=ゲーターストローク
champions.ability.gator-stroke.description=使用者を高速で推進させます。このアビリティは水中でのみ有効です。
champions.ability.hard-slash.name=ハードスラッシュ
champions.ability.hard-slash.description=周囲の敵にダメージを与え、炎の斬撃で吹き飛ばします。
champions.ability.heavensplitter.name=天空斬
champions.ability.heavensplitter.description=武器を投げ、トールの力を呼び出し、経路上の敵にダメージを与えます。
champions.ability.hyper-rush.name=ハイパーラッシュ
champions.ability.hyper-rush.description=短時間、高レベルの速度バーストを得ます。
champions.ability.lifesteal.name=ライフスティール
champions.ability.lifesteal.description=近接攻撃で敵に与えたダメージの一部を回復します。
champions.ability.magnetism.name=マグネティズム
champions.ability.magnetism.description=前方に粒子の円錐を生成し、エンティティを内側に引き寄せます。
champions.ability.regeneration.name=リジェネレーション
champions.ability.regeneration.description=短時間、少量の再生効果を得ます。
champions.ability.shield.name=シールド
champions.ability.shield.description=このアビリティ使用中、増幅された再生効果を得ます。
champions.ability.magnetic-pull.name=マグネティックプル
champions.ability.magnetic-pull.description=この武器で攻撃された敵は、吹き飛ばされる代わりに引き寄せられます。
champions.ability.skyforged-ascent.name=天空鍛造の昇天
champions.ability.skyforged-ascent.description=武器を投げて天空へ舞い上がり、神聖な力に乗り速度を一時的に高める。
champions.ability.speed-boost.name=スピードブースト
champions.ability.speed-boost.description=短時間、小さな速度効果を得る。
champions.ability.throwing-web.name=ウェブ投擲
champions.ability.throwing-web.description=着弾時に一時的にクモの巣を設置するウェブを投げる。敵を捕らえるのに使える。
champions.ability.tilling-tremor.name=耕地の震動
champions.ability.tilling-tremor.description=小範囲の作物を収穫する。範囲内の敵はダメージを受けてノックバックする。
champions.ability.underwater-breathing.name=水中呼吸
champions.ability.underwater-breathing.description=水中でこのアイテムを持つと即座に水中呼吸を付与する。
champions.ability.vine-snare.name=ツルの罠
champions.ability.vine-snare.description=ボルトがツルを放ち、敵を絡め取って地面に縛り付ける。
champions.ability.voltic-bash.name=雷撃突進
champions.ability.voltic-bash.description=チャージして前方へ突進し、進路上の敵にダメージを与える。チャージが高いほどダメージと速度が増す。
champions.ability.water-damage.name=水中ダメージ
champions.ability.water-damage.description=水中での近接攻撃ダメージを固定値増加させる。
champions.ability.wind-dash.name=ウィンドダッシュ
champions.ability.wind-dash.description=前方へ跳躍する。最初に当たった敵は空中に吹き飛ばされる。
champions.ability.wind-slash.name=ウィンドスラッシュ
champions.ability.wind-slash.description=3つの風の衝撃波を放つ。敵に当たるとエネルギーを回復しダメージを与える。
champions.ability.nectar-of-decay.name=腐敗の蜜
champions.ability.nectar-of-decay.description=毒の花を解き放ち、広がる毒雲を発生させて敵の体力を奪い自身を回復する。
champions.ability.soul-harvest.name=ソウルハーベスト
champions.ability.soul-harvest.description=倒れたプレイヤーやモブの魂を集め、ダメージと速度を高める。
champions.ability.hunters-brand.name=ハンターズブランド
champions.ability.hunters-brand.description=同じ対象にニードルグラスプのリセットを2回連続で当てて狂乱状態を発動する。毒状態の敵にボーナスダメージも与える。
champions.ability.needlegrasp.name=ニードルグラスプ
champions.ability.needlegrasp.description=ツルを投げて自分と敵を引き寄せる。近接攻撃で当てるとクールダウンがリセットされる。
champions.ability.vipersprint.name=バイパースプリント
champions.ability.vipersprint.description=高速で前方へダッシュし、照準で軌道を曲げながら障害を切り抜ける。敵に当たるとクールダウンがリセットされる。
champions.ability.healing-nova.name=ヒーリングノヴァ
champions.ability.healing-nova.description=着弾時に近くの味方を{0}{1}回復するノヴァを放つ。
champions.ability.meridian-beam.name=メリディアンビーム
champions.ability.meridian-beam.description=直線上を進むダメージビームを発射する。
champions.ability.equip.name=装備
champions.ability.equip.description=即座に{0}クラスへ切り替える。戦闘中は使用不可。このアイテムに保存された防具が装備される。

