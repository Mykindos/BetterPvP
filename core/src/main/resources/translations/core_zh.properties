## Champions roles (class display names)
core.role.assassin.name=刺客
core.role.knight.name=骑士
core.role.brute.name=蛮力者
core.role.ranger.name=游侠
core.role.mage.name=法师
core.role.warlock.name=术士
core.role.assassin.description=刺客是一个快速敏捷的职业。血量较低且有明显弱点，上手并不容易。最适合偷袭分心或被牵制的敌人，面对有所准备的敌人时则会较为吃力。
core.role.knight.description=骑士是一个强力的进攻型职业。它在进攻中如鱼得水，拥有提升伤害的手段，同时也有一些能在击杀对手前维持生存的技能。
core.role.brute.description=蛮力者是一个难以被撼动的强力职业，拥有良好的控制和防御能力。
core.role.ranger.description=游侠是擅长使用弓的远程职业。有多种不同的选择，分别奖励精准、耐心或远距离射击。
core.role.mage.description=法师是掌握多种元素的职业。可在生命、冰、火、土之间选择，以支援队友、困住敌人并将其击杀。
core.role.warlock.description=术士是一个以生命值为核心的职业。部分技能需要消耗自身生命，其他技能则会惩罚靠近的低血量敌人。

