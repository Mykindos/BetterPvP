clans.tutorial.map-info= чтобы увидеть карту и сориентироваться. На картах отображаются ваши соклановцы. Во время разграбления на них также отображаются враги.
clans.tutorial.shops=В каждом кардинальном направлении есть {0}, содержащий {1}. Здесь можно продать большинство предметов, купить необходимые товары, получить доступ к подземельям и сменить класс.\nВы можете телепортироваться сюда с мирового спауна.
clans.tutorial.fields=В центре карты находится {0}. Оживлённое место, где можно найти руды, места для рыбалки и телепортер к событиям.
clans.tutorial.events=Периодически происходят события, доступные через портал в {0}. Эти события могут дропать {1}. Это мощное, особое оружие с уникальными способностями. Здесь также можно найти руны и жетоны подземелий.
clans.tutorial.classes=В настоящее время существует {0} {1} {2}, по одному на каждый набор брони. У каждого есть свои сильные и слабые стороны. Есть много различных {3} на выбор, выбирайте те, которые подходят вашему стилю игры. Вы можете настроить {4} для любого {5} за столом зачарования.
clans.tutorial.custom-items=Есть пользовательские предметы, которые можно найти, купить или скрафтить. Вы можете просмотреть крафтимые предметы и их рецепты, выполнив
clans.tutorial.custom-items-info=. Эти предметы могут дать вам преимущество в бою или помочь в сборе ресурсов.
clans.tutorial.custom-items-rare=Некоторые из этих предметов доступны только с событий, из подземелий или рейдов, так что будьте начеку.
clans.tutorial.reinforced=Классы/Комплекты определяются по броне, класс назначается автоматически. Вы можете скрафтить конкретный набор брони, чтобы получить усиленный набор. Можно носить только усиленный набор своего класса. Усиленные части дают повышенное здоровье.
clans.tutorial.upgraded-weapons=Ваше базовое оружие можно улучшить. {0} (сделано из золотых блоков) или {1} (сделано из алмазных блоков). {2} увеличивает соответствующий {3} на {4}, а {5} увеличивает урон на {6}. Оружие {7} (найденное на событиях) сочетает эффекты обоих!
clans.tutorial.progression=Есть кое-что помимо боёв, можно также прокачивать другие направления. Повышайте свой прогресс в {0}, {1} и {2}
clans.tutorial.fishing-title=Рыбалка
clans.tutorial.fishing=Возьмите удочку и забросьте её в {0}, ловите рыбу и сокровища. Получайте уровни с уловами, закидывайте наживки, чтобы приманить рыбу, и улучшайте удочку для ловли более тяжёлой рыбы. Продавайте улов в магазинах или уносите сокровища домой.
clans.tutorial.mining-title=Горное дело
clans.tutorial.mining=Возьмите кирку и отправляйтесь в шахты, там вас ждут богатства. Зарабатывайте опыт — в {0} его в 5 раз больше. Более высокие уровни дают больше дропа и скорость добычи.
clans.tutorial.woodcutting-title=Лесозаготовка
clans.tutorial.woodcutting=Возьмите топор и найдите дерево для рубки. Получайте уровни с каждым срубленным блоком, открывая доступ к новым бонусам и способностям.
clans.tutorial.good-luck=Удачи в ваших приключениях и не забывайте получать удовольствие.

